<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚨 AI 防詐盾牌 - 網頁已攔截</title>
    <style>
        body { margin: 0; padding: 0; background-color: #1e1e1e; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .icon { font-size: 80px; margin-bottom: 20px; }
        h1 { color: #ff5c5c; font-size: 36px; margin-bottom: 20px; letter-spacing: 2px; }
        p { font-size: 20px; margin-bottom: 10px; color: #cccccc; }
        .keyword-box { background-color: #ff5c5c; color: white; padding: 10px 20px; border-radius: 8px; font-size: 28px; font-weight: bold; margin-bottom: 30px; letter-spacing: 1px; display: inline-block; }
        .sub-text { font-size: 18px; margin-bottom: 40px; color: #999999; }
        .leave-btn { background-color: #2ea043; color: white; padding: 15px 40px; font-size: 22px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(46, 160, 67, 0.4); }
        .leave-btn:hover { background-color: #2c974b; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="icon">🛡️</div>
    <h1>AI 防詐盾牌 已啟動保護</h1>
    <p>系統偵測到此網頁含有高風險詐騙話術：</p>
    
    <div class="keyword-box" id="reason-box">讀取中...</div>
    
    <p class="sub-text">為保護您的財產與身心安全，我們已主動封鎖此網頁。</p>

    <button id="manual-leave-btn" class="leave-btn">✅ 立即安全離開</button>

    <div style="margin-top: 25px;">
        <a href="#" id="report-false-btn" style="color: #aaaaaa; font-size: 14px; text-decoration: underline;">覺得這是誤判？回報給開發團隊</a>
        <br><br>
        <a href="#" id="bypass-btn" style="color: #666666; font-size: 12px; text-decoration: underline; cursor: pointer;">我了解風險，仍要繼續前往 (不建議)</a>
    </div>

    <script src="config.js"></script>
    <script src="blocked.js"></script>
</body>
</html>
