<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 防詐盾牌</title>

    <script src="config.js"></script>

    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #111827; /* 加深字色：極深灰 */
            --text-sub: #334155;  /* 加深字色：深灰 */
            --border: #cbd5e1;    /* 邊框顏色加深 */
            --panel-bg: #f8fafc;
            --shield-blue: #1a73e8;
            --shield-green-1: #34c759;
            --shield-green-2: #1e8e3e;
            --danger: #ff4444;
            --warning: #ffbb33;
            --safe: #00c851;
            --shadow: rgba(0, 0, 0, 0.12);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --card-bg: #1e1e1e;
                --text-main: #f8fafc; /* 深色模式字體調白 */
                --text-sub: #cbd5e1;
                --border: #475569;
                --panel-bg: #2a2a2a;
                --shadow: rgba(0, 0, 0, 0.35);
            }
        }

        * {
            box-sizing: border-box;
        }

        body {
            width: 400px; /* 稍微加寬以容納更大字體 */
            margin: 0;
            padding: 16px;
            font-family: "Microsoft JhengHei", "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .app-card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 8px 24px var(--shadow);
            border: 2px solid var(--border); /* 加粗外邊框 */
            transition: 0.3s ease;
        }

        h2 {
            margin: 0 0 15px;
            padding: 14px;
            color: white;
            background-color: var(--shield-blue);
            font-size: 20px; /* 放大標題 */
            font-weight: 900;
            text-align: center;
            border-radius: 10px;
            box-shadow: 0 2px 4px var(--shadow);
            letter-spacing: 1.5px;
            cursor: default;
        }

        .subtle-text {
            color: var(--text-main); /* 改用主色提升清晰度 */
            font-size: 15px; /* 放大 */
            font-weight: 700; /* 加粗 */
            line-height: 1.6;
            margin: 0 0 16px;
            text-align: center;
        }

        button {
            width: 100%;
            padding: 14px;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px; /* 放大按鈕字體 */
            font-weight: 900; /* 按鈕極粗體 */
            cursor: pointer;
            transition: transform 0.18s ease, opacity 0.18s ease, filter 0.18s ease;
            margin-bottom: 14px;
        }

        button:hover {
            opacity: 0.92;
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.55;
            cursor: not-allowed;
            transform: none;
        }

        #scan-btn {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }

        @media (prefers-color-scheme: dark) {
            #scan-btn {
                background: linear-gradient(135deg, #555555 0%, #222222 100%);
                border: 1px solid #444444;
            }
        }

        .btn-blue {
            background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
        }

        .btn-green {
            background: linear-gradient(135deg, var(--shield-green-1) 0%, var(--shield-green-2) 100%);
        }

        .btn-red {
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
        }

        .btn-gray {
            background: #475569;
        }

        #loading {
            display: none;
            text-align: center;
            padding: 20px;
            font-weight: 900;
            color: var(--shield-blue);
            font-size: 16px;
        }

        #loading .spinner {
            border: 4px solid var(--border);
            border-top: 4px solid var(--shield-blue);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 12px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #score-container {
            display: none;
            background: #eff6ff; /* 使用純色取代透明度避免模糊 */
            padding: 18px;
            border-radius: 12px;
            margin-bottom: 16px;
            text-align: center;
            border: 2px solid #bfdbfe;
        }

        .score-title {
            font-size: 32px; /* 分數放大 */
            font-weight: 900;
            margin-bottom: 12px;
            color: #1e3a8a;
            transition: 0.5s;
        }

        .progress-wrapper {
            width: 100%;
            position: relative;
        }

        .progress-bg {
            width: 100%;
            height: 14px; /* 進度條加粗 */
            background-color: #cbd5e1;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            border-radius: 10px;
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.5s;
            background: var(--safe);
        }

        .risk-label {
            margin-top: 10px;
            font-size: 16px;
            color: #1e40af;
            font-weight: 900;
        }

        #report-container {
            display: none;
            background: var(--panel-bg);
            padding: 16px;
            border-radius: 12px;
            border: 2px solid var(--border);
            margin-bottom: 16px;
        }

        .report-row {
            margin-bottom: 12px;
        }

        .report-row:last-child {
            margin-bottom: 0;
        }

        .report-label {
            font-size: 15px;
            color: var(--text-sub);
            font-weight: 900;
            margin-bottom: 6px;
        }

        .report-value {
            font-size: 16px; /* 報告內文放大 */
            font-weight: 700; /* 加粗 */
            color: var(--text-main);
            line-height: 1.6;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .section {
            background: var(--panel-bg);
            border: 2px solid var(--border); /* 加粗邊框 */
            border-radius: 12px;
            padding: 16px;
            margin-top: 16px;
        }

        .section-title {
            font-size: 17px;
            font-weight: 900;
            margin-bottom: 12px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .invite-row {
            display: flex;
            gap: 10px;
        }

        #invite_input {
            flex: 1;
            min-width: 0;
            padding: 12px;
            border-radius: 10px;
            border: 2px solid #94a3b8; /* 輸入框外框加深 */
            background: var(--card-bg);
            color: var(--text-main);
            font-size: 20px; /* 輸入字體放大 */
            font-weight: 900;
            text-align: center;
            letter-spacing: 4px;
            text-transform: uppercase;
            outline: none;
        }

        #invite_input:focus {
            border-color: var(--shield-blue);
            box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.2);
        }

        #btn_join_family {
            width: auto;
            min-width: 110px;
            margin-bottom: 0;
            background: linear-gradient(135deg, #16a34a 0%, #15803d 100%);
        }

        .family-status {
            margin-top: 12px;
            padding: 12px;
            border-radius: 10px;
            background: #e0f2fe;
            border: 1px solid #7dd3fc;
            color: #0369a1;
            font-size: 15px;
            font-weight: 700;
            line-height: 1.6;
            word-break: break-word;
            text-align: center;
        }

        .family-status strong {
            color: #0c4a6e;
            font-weight: 900;
        }

        .quick-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 12px;
        }

        .quick-actions button {
            margin-bottom: 0;
            font-size: 15px;
            padding: 12px;
        }

        #dimensions-section,
        #keyword-section {
            display: none;
        }

        .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            padding: 6px 10px;
            border-radius: 8px;
            background: #fee2e2;
            color: #b91c1c;
            border: 1px solid #fca5a5;
            font-size: 14px; /* 標籤放大 */
            font-weight: 900;
        }

        .notice {
            font-size: 14px;
            color: var(--text-sub);
            font-weight: 700; /* 加粗 */
            line-height: 1.6;
            margin-top: 14px;
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.001ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.001ms !important;
                scroll-behavior: auto !important;
            }
        }

        /* 新版人物與警示標誌 */
        .popup-mascot {
            display: block;
            width: 140px;
            max-width: 52%;
            height: auto;
            margin: 0 auto 12px;
            object-fit: contain;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1)); /* 減弱模糊陰影 */
        }

        .header-warning-icon,
        .inline-warning-icon {
            width: 28px;
            height: 28px;
            object-fit: contain;
            vertical-align: middle;
            flex: 0 0 auto;
        }

        #header-title {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        #btn_report_page {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
    </style>
</head>

<body>
    <div class="app-card" id="app-body">
        <img class="popup-mascot" src="mascot-boy-new.png" alt="新版 AI 防詐守護公仔" draggable="false">
        <h2 id="header-title"><img class="header-warning-icon" src="warning-new.png" alt="" aria-hidden="true">AI 防詐盾牌</h2>

        <p class="subtle-text">
            手動掃描目前頁面、反白文字、圖片或連結前，請先確認自己沒有正在輸入信用卡、密碼或驗證碼。
        </p>

        <button id="scan-btn" type="button">
            🔍 掃描目前頁面
        </button>

        <div id="loading">
            <span class="spinner"></span>
            AI 防詐大腦分析中...
        </div>

        <div id="score-container">
            <div class="score-title" id="score-title">-- 分</div>

            <div class="progress-wrapper">
                <div class="progress-bg">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
            </div>

            <div class="risk-label" id="risk-label">等待掃描結果</div>
        </div>

        <div id="report-container">
            <div class="report-row">
                <div class="report-label">風險等級</div>
                <div class="report-value" id="risk-level">--</div>
            </div>

            <div class="report-row">
                <div class="report-label">AI 判斷原因</div>
                <div class="report-value" id="risk-reason">--</div>
            </div>

            <div class="report-row">
                <div class="report-label">安全建議</div>
                <div class="report-value" id="risk-advice">--</div>
            </div>
        </div>

        <div class="section" id="dimensions-section">
            <div class="section-title">🧠 心理操縱特徵</div>
            <div class="tag-list" id="scam-dna-tags"></div>
        </div>

        <div class="section" id="keyword-section">
            <div class="section-title">🔎 命中關鍵線索</div>
            <div class="tag-list" id="keyword-tags"></div>
        </div>

        <div class="section" id="family-section">
            <div class="section-title">👨‍👩‍👧 家庭守護綁定</div>

            <div class="invite-row" id="family-join-row">
                <input
                    id="invite_input"
                    type="text"
                    inputmode="latin"
                    maxlength="6"
                    autocomplete="off"
                    placeholder="輸入6碼"
                    aria-label="家庭邀請碼"
                >

                <button id="btn_join_family" type="button">
                    綁定
                </button>
            </div>

            <div class="family-status" id="family-status">
                目前狀態：<strong>尚未綁定家庭群組</strong>
            </div>

            <div id="family-code-display" style="display: none; background: #eff6ff; padding: 16px; border-radius: 12px; text-align: center; margin-top: 14px; border: 2px solid #93c5fd;">
                <div style="font-size: 15px; color: #1e3a8a; font-weight: 900; margin-bottom: 8px;">您的家庭守護代碼</div>
                <div id="display_code" style="font-size: 28px; font-weight: 900; letter-spacing: 4px; color: #1a73e8; cursor: pointer;" title="點擊複製代碼">------</div>
                
                <div style="display: flex; gap: 10px; margin-top: 12px;">
                    <button id="btn_share_line" type="button" style="flex: 1; background: #06C755; color: white; margin-bottom: 0; padding: 12px; font-size: 15px; border-radius: 10px; border: none; font-weight: 900; cursor: pointer;">
                        💬 LINE 傳代碼
                    </button>
                    <button id="btn_copy_invite" type="button" style="flex: 1; background: #ffffff; color: #1a73e8; border: 2px solid #1a73e8; margin-bottom: 0; padding: 12px; font-size: 15px; border-radius: 10px; font-weight: 900; cursor: pointer;">
                        📄 複製邀請
                    </button>
                </div>

                <button id="btn_toggle_qr" type="button" style="display:none; width: 100%; margin: 12px 0 0; padding: 12px; font-size: 15px; border-radius: 10px; background: #e0f2fe; color: #0284c7; border: 2px solid #7dd3fc; font-weight: 900; cursor: pointer;">
                    顯示 QR Code 給家人掃
                </button>

                <div id="family_qr_box" style="display:none; margin-top: 12px; padding: 12px; background: #ffffff; border-radius: 14px; border: 2px solid #cbd5e1;">
                    <div style="font-size: 15px; color: #0f172a; font-weight: 900; margin-bottom: 10px;">
                        給家人掃描加入家庭守護
                    </div>
                    <canvas id="family_qr_canvas" width="140" height="140" style="width: 140px; height: 140px; background: #fff; border-radius: 10px; border: 2px solid #e2e8f0;"></canvas>
                    <div id="family_qr_text" style="font-size: 13px; margin-top: 8px; color: #475569; word-break: break-all; line-height: 1.5; font-weight: 700;"></div>
                    <div style="font-size: 13px; margin-top: 6px; color: #1e293b; line-height: 1.5; font-weight: 900;">
                        家人掃到後，打開 AI 防詐盾牌並貼上代碼即可綁定。
                    </div>
                </div>
            </div>

            <div class="quick-actions">
                <button id="btn_create_family" class="btn-blue" type="button">
                    建立家庭
                </button>

                <button id="btn_open_dashboard" class="btn-gray" type="button">
                    戰情室
                </button>
            </div>

            <div class="notice">
                綁定後，高風險攔截會同步到家庭戰情室；正式版會透過短效 token 驗證家庭權限。
            </div>
        </div>

        <div class="section">
            <div class="section-title">⚙️ 快速工具</div>

            <div class="quick-actions">
                <button id="btn_safe_exit" class="btn-green" type="button">
                    安全離開
                </button>

                <button id="btn_report_page" class="btn-red" type="button">
                    <img class="inline-warning-icon" src="warning-new.png" alt="" aria-hidden="true">回報可疑網站
                </button>
            </div>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
