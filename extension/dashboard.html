<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta name="ai-shield-skip-scan" content="true" />
    <meta charset="UTF-8">
    <title>AI 防詐盾牌｜家庭戰情室</title>
    <script src="config.js"></script>
    <script src="chart.js"></script>
    <script src="socket.io.min.js"></script>

    <style>

        :root {
            --page-bg: #f5fbff;
            --page-bg-soft: #fffaf2;
            --card-bg: #ffffff; /* 關鍵修改：純白實體背景，拒絕半透明 */
            --card-bg-strong: #ffffff;
            --line-soft: rgba(25, 118, 210, 0.4); /* 邊線加深 */
            --line-tech: rgba(31, 136, 214, 0.30);
            --text-main: #0f172a; /* 字色極致加深 */
            --text-sub: #334155;  /* 次要字色加深 */
            --text-soft: #475569;
            --brand-blue: #1976d2;
            --brand-cyan: #23b7c7;
            --brand-green: #2eaa73;
            --brand-indigo: #6d7ee8;
            --warm-cream: #fff6e8;
            --danger-red: #dc2626;
            --warning-yellow: #d99a2b;
            --safe-green: #16a34a;
            --shadow-card: 0 8px 24px rgba(25, 118, 210, 0.15); /* 陰影變實 */
            --shadow-soft: 0 10px 24px rgba(59, 111, 156, 0.10);
            --glow-blue: 0 0 0 1px rgba(25,118,210,0.2), 0 14px 36px rgba(35,183,199,0.14);
        }

        * {
            box-sizing: border-box;
        }

        html {
            min-height: 100%;
            background: #f5fbff;
        }

        body {
            margin: 0;
            padding: 26px;
            min-height: 100vh;
            font-family: "Segoe UI", "Microsoft JhengHei", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-main);
            /* 保持原有的背景裝飾設計 */
            background:
                radial-gradient(circle at 12% 12%, rgba(35,183,199,0.16) 0 0, transparent 29%),
                radial-gradient(circle at 88% 14%, rgba(109,126,232,0.12) 0 0, transparent 30%),
                radial-gradient(circle at 82% 82%, rgba(255,183,94,0.12) 0 0, transparent 34%),
                linear-gradient(135deg, #f5fbff 0%, #ffffff 45%, #fff8ed 100%);
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(25,118,210,0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(25,118,210,0.08) 1px, transparent 1px);
            background-size: 36px 36px;
            mask-image: linear-gradient(to bottom, rgba(0,0,0,0.32), rgba(0,0,0,0.04));
            z-index: -2;
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background:
                linear-gradient(115deg, transparent 0%, rgba(35,183,199,0.055) 20%, transparent 40%),
                linear-gradient(245deg, transparent 0%, rgba(25,118,210,0.04) 18%, transparent 36%);
            z-index: -1;
        }

        /* 關鍵修改：拔除 blur，加深邊框，底色變純白 */
        .header,
        .control-panel,
        .stat-box,
        .chart-container,
        .log-header,
        .table-wrapper {
            background: #ffffff; 
            border: 2px solid var(--line-soft);
            box-shadow: var(--shadow-card);
            /* 刪除 backdrop-filter: blur(16px); 解決霧霧的問題 */
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 22px;
            padding: 24px 28px;
            margin-bottom: 24px;
            border-radius: 30px;
            background: #ffffff; /* 頂部面板純白 */
            box-shadow: var(--glow-blue);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: "";
            position: absolute;
            right: -110px;
            top: -120px;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(35,183,199,0.15), transparent 62%);
            pointer-events: none;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 16px;
            min-width: 0;
            position: relative;
            z-index: 1;
        }

        .dashboard-warning-icon {
            width: 66px;
            height: 66px;
            object-fit: contain;
            flex: 0 0 auto;
            background: linear-gradient(135deg, #ffffff, #eff9ff);
            padding: 11px;
            border-radius: 22px;
            border: 2px solid rgba(25,118,210,0.3); /* 邊框加深 */
            box-shadow: 0 12px 26px rgba(25,118,210,0.14);
        }

        .header h1 {
            margin: 0;
            color: #0f172a; /* 標題加深 */
            font-size: clamp(34px, 3.5vw, 44px);
            letter-spacing: 0.8px;
            line-height: 1.25;
            font-weight: 900;
        }

        #clock {
            position: relative;
            z-index: 1;
            font-size: 26px; /* 時鐘放大 */
            font-weight: 900;
            letter-spacing: 0.5px;
            white-space: nowrap;
            color: #1e3a8a;
            background: #eff6ff; /* 取代漸層，乾淨的底色 */
            border: 2px solid #bfdbfe;
            padding: 13px 22px;
            border-radius: 999px;
            box-shadow: 0 8px 20px rgba(25,118,210,0.12);
        }

        .control-panel {
            padding: 26px 30px;
            border-radius: 28px;
            margin-bottom: 24px;
            display: flex;
            gap: 18px;
            align-items: center;
            flex-wrap: wrap;
            background: #ffffff; /* 純色背景 */
        }

        .control-panel label {
            font-size: 24px;
            font-weight: 900;
            color: #0f172a;
        }

        input {
            background: #ffffff;
            border: 3px solid #94a3b8; /* 輸入框邊框加深加粗 */
            color: #0f172a; /* 輸入框字體加深 */
            padding: 16px 20px;
            border-radius: 20px;
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 5px;
            outline: none;
            text-align: center;
            width: 220px;
            transition: 0.25s ease;
            text-transform: uppercase;
        }

        input:focus {
            border-color: var(--brand-blue);
            box-shadow: 0 0 0 5px rgba(26,115,232,0.2);
        }

        button {
            border: none;
            padding: 16px 28px;
            border-radius: 18px;
            font-size: 22px;
            font-weight: 900;
            cursor: pointer;
            transition: 0.25s ease;
            letter-spacing: 0.5px;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .btn-start {
            background: #16a34a; /* 實心綠色 */
            color: #ffffff;
            box-shadow: 0 8px 20px rgba(22,163,74,0.3);
        }

        .btn-stop {
            background: #dc2626; /* 實心紅色 */
            color: #ffffff;
            display: none;
            box-shadow: 0 8px 20px rgba(220,38,38,0.3);
        }

        .btn-manual {
            background: #2563eb; /* 實心藍色 */
            color: #ffffff;
            box-shadow: 0 8px 20px rgba(37,99,235,0.3);
        }

        button:disabled {
            opacity: 0.58;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .control-spacer {
            flex: 1 1 auto;
            min-width: 12px;
        }

        .status-badge {
            padding: 16px 24px;
            border-radius: 999px;
            font-size: 22px;
            font-weight: 900;
            background: #f1f5f9;
            color: #334155;
            transition: 0.25s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 2px solid #cbd5e1;
        }

        .status-connected {
            background: #dcfce7;
            color: #166534;
            border-color: #86efac;
        }

        .live-indicator {
            display: inline-block;
            width: 16px;
            height: 16px;
            background-color: var(--safe-green);
            border-radius: 50%;
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(22,163,74,0.5); }
            70% { box-shadow: 0 0 0 13px rgba(22,163,74,0); }
            100% { box-shadow: 0 0 0 0 rgba(22,163,74,0); }
        }

        #emergency-banner {
            display: none;
            background: #dc2626; /* 實體警告紅 */
            color: white;
            padding: 24px;
            border-radius: 28px;
            margin-bottom: 24px;
            font-weight: 900;
            font-size: 28px;
            text-align: center;
            box-shadow: 0 18px 40px rgba(220,38,38,0.3);
            animation: strobe 0.9s infinite alternate;
            letter-spacing: 0.5px;
            border: 4px solid #fca5a5;
        }

        @keyframes strobe {
            from { transform: scale(1); }
            to { transform: scale(1.01); }
        }

        .emergency-warning-icon {
            width: 44px;
            height: 44px;
            object-fit: contain;
            vertical-align: middle;
            margin-right: 12px;
        }

        .stats-boxes {
            display: flex;
            gap: 20px;
            margin-bottom: 24px;
        }

        .stat-box {
            flex: 1;
            border-radius: 30px;
            padding: 32px 24px;
            text-align: center;
            position: relative;
            overflow: hidden;
            background: #ffffff; /* 統一為純白 */
        }

        .stat-box::before {
            content: "";
            position: absolute;
            top: -58px;
            right: -44px;
            width: 132px;
            height: 132px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(25,118,210,0.1), transparent 68%);
        }

        /* 已經修正這裡原本的多餘冒號 */
        .stat-box:nth-child(2)::before {
            background: radial-gradient(circle, rgba(22,163,74,0.1), transparent 68%);
        }

        /* 已經修正這裡原本的多餘冒號 */
        .stat-box:nth-child(3)::before {
            background: radial-gradient(circle, rgba(220,38,38,0.1), transparent 68%);
        }

        .stat-title {
            position: relative;
            color: var(--text-main); /* 加深加黑 */
            font-size: 24px; /* 放大 */
            font-weight: 900;
            letter-spacing: 0.5px;
        }

        .stat-value {
            position: relative;
            font-size: clamp(64px, 7vw, 84px); /* 數字超級放大 */
            font-weight: 900;
            margin: 12px 0 2px;
            font-family: ui-rounded, "Segoe UI", "Microsoft JhengHei", sans-serif;
            color: var(--brand-blue);
            line-height: 1.05;
        }

        .val-safe { color: var(--safe-green); }
        .val-danger { color: var(--danger-red); }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 24px;
            margin-bottom: 24px;
        }

        .chart-container {
            border-radius: 30px;
            padding: 32px;
            min-width: 0;
            background: #ffffff;
            position: relative;
            overflow: hidden;
        }

        .chart-container::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background:
                linear-gradient(120deg, rgba(35,183,199,0.05), transparent 34%);
        }

        .chart-title {
            position: relative;
            z-index: 1;
            font-size: 28px; /* 圖表標題放大 */
            font-weight: 900;
            color: #0f172a;
            margin-bottom: 20px;
            border-bottom: 2px solid #e2e8f0; /* 邊線加實 */
            padding-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
        }

        .chart-title::before {
            content: "";
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #1a73e8;
            box-shadow: 0 0 0 4px rgba(26,115,232,0.2);
            display: inline-block;
            margin-right: 10px;
            flex: 0 0 auto;
        }

        .chart-title > span {
            display: inline-flex;
            align-items: center;
        }

        canvas {
            position: relative;
            z-index: 1;
            min-height: 280px;
        }

        .log-header {
            margin-top: 0;
            border-radius: 28px 28px 0 0;
            padding: 26px 32px;
            margin-bottom: 0;
            background: #ffffff;
        }

        #btn-clear-logs {
            background: #fee2e2;
            color: #b91c1c;
            border: 2px solid #fecaca;
            font-size: 20px;
            padding: 12px 18px;
            box-shadow: none;
        }

        #btn-clear-logs:hover {
            background: #fca5a5;
            color: #7f1d1d;
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 0 0 28px 28px;
            border-top: 0;
            background: #ffffff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: transparent;
            border-radius: 0 0 28px 28px;
            overflow: hidden;
        }

        /* 關鍵：表格字體放大、加粗、加深 */
        th,
        td {
            padding: 24px 20px;
            text-align: left;
            border-bottom: 2px solid #e2e8f0; /* 分隔線變明顯 */
            font-size: 20px; /* 放大 */
            font-weight: 700; /* 加粗 */
            color: #0f172a; /* 顏色加深至黑灰 */
            vertical-align: top;
            line-height: 1.6;
        }

        th {
            background: #f8fafc;
            color: #0f172a;
            font-weight: 900;
            font-size: 22px; /* 表頭再放大 */
        }

        tr:hover {
            background: #f0f9ff;
        }

        .empty-row {
            text-align: center;
            color: #334155; /* 加深 */
            padding: 56px 20px;
            font-size: 22px; /* 放大 */
            font-weight: 900;
            background: #fbfdff;
        }

        .risk-high {
            color: var(--danger-red);
            font-weight: 900;
        }

        .risk-warn {
            color: #b45309;
            font-weight: 900;
        }

        .risk-safe {
            color: var(--safe-green);
            font-weight: 900;
        }

        .url-cell {
            max-width: 360px;
            word-break: break-all;
            color: #1e293b;
        }

        .reason-cell {
            max-width: 520px;
            color: #0f172a;
        }

        .evidence-button {
            margin-top: 10px;
            padding: 10px 16px;
            font-size: 16px;
            border-radius: 999px;
            background: #e0f2fe;
            color: #0284c7;
            border: 2px solid #7dd3fc;
            font-weight: 900;
            cursor: pointer;
        }

        .new-row-highlight {
            animation: highlightRow 2.5s ease-out forwards;
        }

        @keyframes highlightRow {
            0% { background-color: rgba(35,183,199,0.18); }
            100% { background-color: transparent; }
        }

        @media (max-width: 1000px) {
            body {
                padding: 16px;
            }

            .dashboard-grid,
            .stats-boxes {
                grid-template-columns: 1fr;
                flex-direction: column;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
            }

            .header-brand {
                justify-content: center;
            }

            .control-panel {
                align-items: stretch;
            }

            input,
            button,
            .status-badge {
                width: 100%;
                justify-content: center;
            }

            .control-spacer {
                display: none;
            }

            th,
            td {
                font-size: 18px;
                padding: 18px 16px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.001ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.001ms !important;
            }
        }

        /* 正式產品版：不顯示任何設計稿或版本標籤 */
        .header h1::after {
            content: none !important;
            display: none !important;
        }

    </style>
</head>

<body data-ai-shield-skip-scan="true">
    <header class="header">
        <div class="header-brand"><img class="dashboard-warning-icon" src="warning-new.png" alt="新版警示標誌"><h1>AI 防詐盾牌｜家庭戰情室</h1></div>
        <div id="clock">--:--:--</div>
    </header>

    <section class="control-panel" aria-label="守護者連線控制">
        <label for="family-id-input">📡 守護者連線：</label>

        <input
            type="text"
            id="family-id-input"
            placeholder="輸入 6 碼"
            maxlength="6"
            autocomplete="off"
            aria-label="家庭邀請碼"
        >

        <button id="btn-start" class="btn-start" type="button">▶️ 啟動即時監控</button>
        <button id="btn-stop" class="btn-stop" type="button">⏹️ 斷開連線</button>
        <button id="btn-manual" class="btn-manual" type="button">🔄 更新數據</button>

        <div class="control-spacer" aria-hidden="true"></div>

        <div id="connection-status" class="status-badge" aria-live="polite">
            🔴 尚未連線 / 閒置中
        </div>
    </section>

    <section id="emergency-banner" role="alert" aria-live="assertive">
        <img class="emergency-warning-icon" src="warning-new.png" alt="警示">[緊急警報] 您的家人剛剛瀏覽了高風險網頁，系統已強制攔截！
        <div
            id="emergency-detail"
            style="font-size: 20px; font-weight: 700; margin-top: 12px; color: rgba(255,255,255,1);"
        ></div>
    </section>

    <section class="stats-boxes" aria-label="防護統計">
        <div class="stat-box">
            <div class="stat-title">總掃描次數</div>
            <div class="stat-value" id="stat-total" data-target="0">0</div>
        </div>

        <div class="stat-box">
            <div class="stat-title">安全放行</div>
            <div class="stat-value val-safe" id="stat-safe" data-target="0">0</div>
        </div>

        <div class="stat-box">
            <div class="stat-title">危險攔截</div>
            <div class="stat-value val-danger" id="stat-danger" data-target="0">0</div>
        </div>
    </section>

    <section class="dashboard-grid" aria-label="戰情圖表">
        <div class="chart-container">
            <div class="chart-title">🛡️ 防護狀態比例</div>
            <canvas id="ratioChart" aria-label="防護狀態比例圖"></canvas>
        </div>

        <div class="chart-container">
            <div class="chart-title">
                <span>📈 近期風險趨勢（危險指數）</span>
            </div>
            <canvas id="trendChart" aria-label="近期風險趨勢圖"></canvas>
        </div>
    </section>

    <section aria-label="詳細掃描紀錄">
        <div class="chart-title log-header">
            <span>📜 詳細掃描紀錄（即時更新）</span>

            <button id="btn-clear-logs" type="button">
                🧹 清除本機紀錄
            </button>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>時間</th>
                        <th>目標網址</th>
                        <th>風險指數</th>
                        <th>AI 心理分析與特徵</th>
                        <th>系統狀態</th>
                    </tr>
                </thead>

                <tbody id="log-table-body">
                    <tr>
                        <td colspan="5" class="empty-row">
                            請輸入家庭邀請碼並啟動連線。
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>

    <script src="dashboard.js"></script>
</body>
</html>
