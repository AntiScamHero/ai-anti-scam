<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>AI 防詐戰情室 - WebSocket 即時連線版</title>
    <script src="config.js"></script>
    <script src="chart.js"></script>
    <script src="socket.io.min.js"></script>

    <style>
        :root {
            --bg-dark: #0d1117;
            --panel-bg: #161b22;
            --border-color: #30363d;
            --text-main: #ffffff;
            --text-sub: #8b949e;
            --safe-green: #00C851;
            --danger-red: #FF4444;
            --warning-yellow: #ffbb33;
            --brand-blue: #33b5e5;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 25px;
            font-family: "Segoe UI", "Microsoft JhengHei", Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .header h1 {
            margin: 0;
            color: var(--brand-blue);
            font-size: 32px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(51, 181, 229, 0.4);
        }

        #clock {
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .control-panel {
            background: var(--panel-bg);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            margin-bottom: 25px;
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }

        .control-panel label {
            font-size: 18px;
            font-weight: bold;
        }

        input {
            background: #000;
            border: 2px solid var(--border-color);
            color: var(--text-main);
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 20px;
            font-weight: 900;
            letter-spacing: 4px;
            outline: none;
            text-align: center;
            width: 180px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        input:focus {
            border-color: var(--brand-blue);
            box-shadow: 0 0 15px rgba(51, 181, 229, 0.3);
        }

        button {
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 1px;
        }

        .btn-start {
            background: var(--safe-green);
            color: black;
        }

        .btn-start:hover {
            background: #00E676;
            box-shadow: 0 0 15px rgba(0, 200, 81, 0.6);
            transform: translateY(-2px);
        }

        .btn-stop {
            background: var(--danger-red);
            color: white;
            display: none;
        }

        .btn-stop:hover {
            background: #ff5e5e;
            box-shadow: 0 0 15px rgba(255, 68, 68, 0.6);
        }

        .btn-manual {
            background: var(--border-color);
            color: white;
        }

        .btn-manual:hover {
            background: #4b5563;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .control-spacer {
            flex: 1 1 auto;
            min-width: 12px;
        }

        .status-badge {
            padding: 12px 20px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 900;
            background: var(--border-color);
            color: var(--text-sub);
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-connected {
            background: rgba(0, 200, 81, 0.15);
            color: var(--safe-green);
            border: 2px solid var(--safe-green);
            box-shadow: 0 0 20px rgba(0, 200, 81, 0.3);
        }

        .live-indicator {
            display: inline-block;
            width: 14px;
            height: 14px;
            background-color: var(--safe-green);
            border-radius: 50%;
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 200, 81, 0.8); }
            70% { box-shadow: 0 0 0 12px rgba(0, 200, 81, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 200, 81, 0); }
        }

        #emergency-banner {
            display: none;
            background: linear-gradient(90deg, #FF4444 0%, #CC0000 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            font-weight: 900;
            font-size: 22px;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 68, 68, 0.8);
            animation: strobe 0.4s infinite alternate;
            letter-spacing: 1px;
        }

        @keyframes strobe {
            from { opacity: 1; transform: scale(1); }
            to { opacity: 0.9; transform: scale(1.02); }
        }

        .stats-boxes {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-box {
            flex: 1;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        .stat-title {
            color: var(--text-sub);
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 55px;
            font-weight: 900;
            margin: 15px 0 5px;
            font-family: monospace;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        .val-safe {
            color: var(--safe-green);
        }

        .val-danger {
            color: var(--danger-red);
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 25px;
            margin-bottom: 25px;
        }

        .chart-container {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            min-width: 0;
        }

        .chart-title {
            font-size: 20px;
            font-weight: 900;
            color: var(--text-main);
            margin-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
        }

        .log-header {
            margin-top: 0;
        }

        #btn-clear-logs {
            background: rgba(255, 68, 68, 0.12);
            color: #ff8a8a;
            border: 1px solid rgba(255, 68, 68, 0.34);
            font-size: 14px;
            padding: 10px 14px;
        }

        #btn-clear-logs:hover {
            background: rgba(255, 68, 68, 0.24);
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--panel-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        th,
        td {
            padding: 18px 20px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            font-size: 16px;
            vertical-align: top;
        }

        th {
            background: #21262d;
            color: var(--text-main);
            font-weight: 900;
            text-transform: uppercase;
            font-size: 15px;
            letter-spacing: 1px;
        }

        tr:hover {
            background: #1c2128;
        }

        .empty-row {
            text-align: center;
            color: var(--text-sub);
            padding: 38px 20px;
            font-weight: 800;
        }

        .risk-high {
            color: var(--danger-red);
            font-weight: 900;
        }

        .risk-warn {
            color: var(--warning-yellow);
            font-weight: 900;
        }

        .risk-safe {
            color: var(--safe-green);
            font-weight: 900;
        }

        .url-cell {
            max-width: 360px;
            word-break: break-all;
            color: #c9d1d9;
        }

        .reason-cell {
            max-width: 520px;
            line-height: 1.6;
            color: #d6deeb;
        }

        .evidence-button {
            margin-top: 10px;
            padding: 8px 12px;
            font-size: 13px;
            border-radius: 999px;
            background: rgba(51, 181, 229, 0.14);
            color: var(--brand-blue);
            border: 1px solid rgba(51, 181, 229, 0.35);
        }

        .new-row-highlight {
            animation: highlightRow 2.5s ease-out forwards;
        }

        @keyframes highlightRow {
            0% { background-color: rgba(51, 181, 229, 0.28); }
            100% { background-color: transparent; }
        }

        @media (max-width: 1000px) {
            .dashboard-grid,
            .stats-boxes {
                grid-template-columns: 1fr;
                flex-direction: column;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
            }

            .control-panel {
                align-items: stretch;
            }

            input,
            button,
            .status-badge {
                width: 100%;
                justify-content: center;
            }

            .control-spacer {
                display: none;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.001ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.001ms !important;
            }
        }
    </style>
</head>

<body>
    <header class="header">
        <h1>🛡️ AI 遠端家庭防護網 - 戰情儀表板</h1>
        <div id="clock">--:--:--</div>
    </header>

    <section class="control-panel" aria-label="守護者連線控制">
        <label for="family-id-input">📡 守護者連線：</label>

        <input
            type="text"
            id="family-id-input"
            placeholder="輸入 6 碼"
            maxlength="6"
            autocomplete="off"
            aria-label="家庭邀請碼"
        >

        <button id="btn-start" class="btn-start" type="button">▶️ 啟動即時監控</button>
        <button id="btn-stop" class="btn-stop" type="button">⏹️ 斷開連線</button>
        <button id="btn-manual" class="btn-manual" type="button">🔄 更新數據</button>

        <div class="control-spacer" aria-hidden="true"></div>

        <div id="connection-status" class="status-badge" aria-live="polite">
            🔴 尚未連線 / 閒置中
        </div>
    </section>

    <section id="emergency-banner" role="alert" aria-live="assertive">
        ⚠️ [緊急警報] 您的家人剛剛瀏覽了高風險網頁，系統已強制攔截！
        <div
            id="emergency-detail"
            style="font-size: 16px; font-weight: normal; margin-top: 8px; color: rgba(255,255,255,0.9);"
        ></div>
    </section>

    <section class="stats-boxes" aria-label="防護統計">
        <div class="stat-box">
            <div class="stat-title">總掃描次數</div>
            <div class="stat-value" id="stat-total" data-target="0">0</div>
        </div>

        <div class="stat-box">
            <div class="stat-title">安全放行</div>
            <div class="stat-value val-safe" id="stat-safe" data-target="0">0</div>
        </div>

        <div class="stat-box">
            <div class="stat-title">危險攔截</div>
            <div class="stat-value val-danger" id="stat-danger" data-target="0">0</div>
        </div>
    </section>

    <section class="dashboard-grid" aria-label="戰情圖表">
        <div class="chart-container">
            <div class="chart-title">🛡️ 防護狀態比例</div>
            <canvas id="ratioChart" aria-label="防護狀態比例圖"></canvas>
        </div>

        <div class="chart-container">
            <div class="chart-title">
                <span>📈 近期風險趨勢（危險指數）</span>
            </div>
            <canvas id="trendChart" aria-label="近期風險趨勢圖"></canvas>
        </div>
    </section>

    <section aria-label="詳細掃描紀錄">
        <div class="chart-title log-header">
            <span>📜 詳細掃描紀錄（即時更新）</span>

            <button id="btn-clear-logs" type="button">
                🗑️ 清空所有紀錄
            </button>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>時間</th>
                        <th>目標網址</th>
                        <th>風險指數</th>
                        <th>AI 心理分析與特徵</th>
                        <th>系統狀態</th>
                    </tr>
                </thead>

                <tbody id="log-table-body">
                    <tr>
                        <td colspan="5" class="empty-row">
                            請輸入家庭邀請碼並啟動連線。
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>

    <script src="dashboard.js"></script>
</body>
</html>
