<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 防詐盾牌｜家庭即時戰情室</title>

    <script src="config.js"></script>
    <script src="chart.js"></script>
    <script src="socket.io.min.js"></script>

    <style>
        :root {
            --bg-dark: #0d1117;
            --panel-bg: #161b22;
            --panel-bg-soft: #1c2128;
            --border-color: #30363d;
            --text-main: #ffffff;
            --text-sub: #8b949e;
            --safe-green: #00C851;
            --safe-green-light: #00E676;
            --danger-red: #FF4444;
            --danger-red-light: #ff5e5e;
            --brand-blue: #33b5e5;
            --brand-blue-soft: rgba(51, 181, 229, 0.15);
            --warning-yellow: #FFBB33;
            --sim-purple: #9933cc;
            --shadow: rgba(0, 0, 0, 0.45);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 25px;
            font-family: "Segoe UI", "Microsoft JhengHei", Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 25px;
            gap: 16px;
            flex-wrap: wrap;
        }

        .header h1 {
            margin: 0;
            color: var(--brand-blue);
            font-size: 32px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(51, 181, 229, 0.4);
        }

        #clock {
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 1px;
            color: var(--text-main);
        }

        .control-panel {
            background: var(--panel-bg);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            margin-bottom: 25px;
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: 0 8px 24px var(--shadow);
        }

        label {
            font-size: 18px;
            font-weight: bold;
        }

        input {
            background: #000000;
            border: 2px solid var(--border-color);
            color: var(--text-main);
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 20px;
            font-weight: 900;
            letter-spacing: 4px;
            outline: none;
            text-align: center;
            width: 180px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        input:focus {
            border-color: var(--brand-blue);
            box-shadow: 0 0 15px rgba(51, 181, 229, 0.3);
        }

        button,
        .btn-simulator {
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 1px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:hover,
        .btn-simulator:hover {
            transform: translateY(-2px);
        }

        .btn-start {
            background: var(--safe-green);
            color: black;
        }

        .btn-start:hover {
            background: var(--safe-green-light);
            box-shadow: 0 0 15px rgba(0, 200, 81, 0.6);
        }

        .btn-stop {
            background: var(--danger-red);
            color: white;
            display: none;
        }

        .btn-stop:hover {
            background: var(--danger-red-light);
            box-shadow: 0 0 15px rgba(255, 68, 68, 0.6);
        }

        .btn-manual {
            background: var(--border-color);
            color: white;
        }

        .btn-manual:hover {
            background: #4b5563;
        }

        .btn-simulator {
            background: linear-gradient(135deg, #aa66cc 0%, var(--sim-purple) 100%);
            color: white;
            box-shadow: 0 0 15px rgba(153, 51, 204, 0.35);
        }

        .btn-simulator:hover {
            box-shadow: 0 0 18px rgba(153, 51, 204, 0.7);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .status-badge {
            background: #2d333b;
            color: var(--text-sub);
            border: 1px solid var(--border-color);
            padding: 10px 14px;
            border-radius: 999px;
            font-size: 15px;
            font-weight: bold;
            white-space: nowrap;
        }

        .status-connected {
            color: var(--safe-green);
            background: rgba(0, 200, 81, 0.1);
            border-color: rgba(0, 200, 81, 0.45);
        }

        .live-indicator {
            width: 10px;
            height: 10px;
            background: var(--safe-green);
            display: inline-block;
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 10px rgba(0, 200, 81, 0.8);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0.4; transform: scale(0.9); }
        }

        #emergency-banner {
            display: none;
            background: var(--danger-red);
            color: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            font-size: 22px;
            font-weight: 900;
            text-align: center;
            box-shadow: 0 0 24px rgba(255, 68, 68, 0.45);
            animation: dangerFlash 1s infinite;
        }

        @keyframes dangerFlash {
            0% { filter: brightness(1); }
            50% { filter: brightness(1.25); }
            100% { filter: brightness(1); }
        }

        .stats-boxes {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-box {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 8px 24px var(--shadow);
        }

        .stat-title {
            color: var(--text-sub);
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 44px;
            font-weight: 900;
            color: var(--brand-blue);
            line-height: 1;
        }

        .val-safe {
            color: var(--safe-green);
        }

        .val-danger {
            color: var(--danger-red);
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .chart-container {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 8px 24px var(--shadow);
            min-height: 360px;
        }

        .chart-title {
            color: var(--text-main);
            font-size: 22px;
            font-weight: 900;
            margin-bottom: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
        }

        canvas {
            max-width: 100%;
        }

        .log-header {
            margin-top: 30px;
            border-bottom: none;
        }

        #btn-clear-logs {
            background-color: transparent;
            color: var(--danger-red);
            border: 1px solid var(--danger-red);
            padding: 6px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
        }

        #btn-clear-logs:hover {
            background-color: var(--danger-red);
            color: white;
        }

        .table-wrapper {
            width: 100%;
            overflow-x: auto;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--panel-bg);
            min-width: 900px;
        }

        th,
        td {
            padding: 18px 20px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            font-size: 16px;
            vertical-align: top;
        }

        th {
            background: #21262d;
            color: var(--text-main);
            font-weight: 900;
            text-transform: uppercase;
            font-size: 15px;
            letter-spacing: 1px;
        }

        tr:hover {
            background: var(--panel-bg-soft);
        }

        .new-row-highlight {
            animation: highlightRow 2.5s ease-out forwards;
        }

        @keyframes highlightRow {
            0% { background-color: rgba(51, 181, 229, 0.4); }
            100% { background-color: transparent; }
        }

        .risk-high {
            color: var(--danger-red);
            font-weight: 900;
        }

        .risk-safe {
            color: var(--safe-green);
            font-weight: bold;
        }

        .risk-warn {
            color: var(--warning-yellow);
            font-weight: bold;
        }

        .pop-effect {
            animation: pop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop {
            0% { transform: scale(1); }
            40% { transform: scale(1.4); }
            100% { transform: scale(1); }
        }

        .empty-row {
            text-align: center;
            color: var(--text-sub);
            font-size: 18px;
            padding: 30px;
        }

        @media (max-width: 960px) {
            body {
                padding: 18px;
            }

            .header h1 {
                font-size: 26px;
            }

            .stats-boxes,
            .dashboard-grid {
                grid-template-columns: 1fr;
            }

            .control-panel {
                align-items: stretch;
            }

            .control-panel label,
            .control-panel input,
            .control-panel button,
            .control-panel a,
            .status-badge {
                width: 100%;
            }

            input {
                width: 100%;
            }

            .chart-container {
                min-height: 320px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.001ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.001ms !important;
            }
        }
    </style>
</head>

<body>
    <header class="header">
        <div>
            <h1>🛡️ AI 防詐盾牌｜家庭即時戰情室</h1>
            <div style="color: var(--text-sub); font-weight: 700; margin-top: 6px;">在長輩輸入資料前，AI 先攔截，家人即時介入。</div>
        </div>
        <div id="clock">--:--:--</div>
    </header>

    <section class="control-panel" aria-label="戰情室控制面板">
        <label for="family-id-input">📡 守護者連線：</label>

        <input
            type="text"
            id="family-id-input"
            placeholder="輸入 6 碼"
            maxlength="6"
            autocomplete="off"
            inputmode="text"
            aria-label="家庭邀請碼"
        >

        <button id="btn-start" class="btn-start" type="button">
            ▶️ 啟動即時監控
        </button>

        <button id="btn-stop" class="btn-stop" type="button">
            ⏹️ 斷開連線
        </button>

        <button id="btn-manual" class="btn-manual" type="button">
            🔄 更新數據
        </button>

        <div style="flex-grow: 1;"></div>

        <a href="simulator.html" target="_blank" rel="noopener noreferrer" class="btn-simulator">
            🎮 防詐實戰演練
        </a>

        <div id="connection-status" class="status-badge" aria-live="polite">
            🔴 尚未連線 / 閒置中
        </div>
    </section>

    <section id="emergency-banner" role="alert" aria-live="assertive">
        ⚠️ [緊急警報] 您的家人剛剛瀏覽了高風險網頁，系統已強制攔截！
        <div
            id="emergency-detail"
            style="font-size: 16px; font-weight: normal; margin-top: 8px; color: rgba(255,255,255,0.9);"
        ></div>
    </section>

    <section class="stats-boxes" aria-label="防護統計">
        <div class="stat-box">
            <div class="stat-title">總掃描次數</div>
            <div class="stat-value" id="stat-total" data-target="0">0</div>
        </div>

        <div class="stat-box">
            <div class="stat-title">安全放行</div>
            <div class="stat-value val-safe" id="stat-safe" data-target="0">0</div>
        </div>

        <div class="stat-box">
            <div class="stat-title">危險攔截</div>
            <div class="stat-value val-danger" id="stat-danger" data-target="0">0</div>
        </div>
    </section>

    <section class="dashboard-grid" aria-label="戰情圖表">
        <div class="chart-container">
            <div class="chart-title">🛡️ 防護狀態比例</div>
            <canvas id="ratioChart" aria-label="防護狀態比例圖"></canvas>
        </div>

        <div class="chart-container">
            <div class="chart-title">
                <span>📈 近期風險趨勢（危險指數）</span>
            </div>
            <canvas id="trendChart" aria-label="近期風險趨勢圖"></canvas>
        </div>
    </section>

    <section aria-label="詳細掃描紀錄">
        <div class="chart-title log-header">
            <span>📜 詳細掃描紀錄（即時更新）</span>

            <button id="btn-clear-logs" type="button">
                🗑️ 清空所有紀錄
            </button>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>時間</th>
                        <th>目標網址</th>
                        <th>風險指數</th>
                        <th>AI 心理分析與特徵</th>
                        <th>系統狀態</th>
                    </tr>
                </thead>

                <tbody id="log-table-body">
                    <tr>
                        <td colspan="5" class="empty-row">
                            請輸入家庭邀請碼並啟動連線。
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>

    <script src="dashboard.js"></script>
</body>
</html>
