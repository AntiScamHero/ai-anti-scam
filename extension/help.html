<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 防詐盾牌｜遇到可疑訊息怎麼辦</title>
  <style>
    :root{--bg:#f2fbff;--card:#fff;--ink:#0b2a50;--sub:#51657d;--blue:#2684ff;--green:#22c55e;--red:#ef4444;--yellow:#ffd43b;--line:#d8ecff;--soft:#f7fbff;--shadow:rgba(32,94,160,.16)}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 12% 4%,rgba(38,132,255,.20),transparent 32%),radial-gradient(circle at 92% 16%,rgba(34,197,94,.18),transparent 28%),var(--bg);font-family:"Microsoft JhengHei",system-ui,-apple-system,"Segoe UI",sans-serif;color:var(--ink);padding:22px;display:flex;align-items:center;justify-content:center}.page{width:min(920px,100%);background:var(--card);border:2px solid var(--line);border-radius:34px;padding:28px;box-shadow:0 28px 70px var(--shadow)}.hero{display:grid;grid-template-columns:180px 1fr;gap:24px;align-items:center}.robot{width:180px;height:180px;object-fit:contain;border-radius:34px;background:linear-gradient(135deg,#eaf6ff,#ffffff);padding:12px;filter:drop-shadow(0 16px 24px rgba(38,132,255,.18))}.eyebrow{display:inline-flex;background:#e9f7ef;border:2px solid rgba(34,197,94,.30);color:#10773a;border-radius:999px;padding:8px 14px;font-weight:1000;font-size:18px;margin-bottom:12px}h1{font-size:clamp(38px,6vw,66px);line-height:1.06;margin:0 0 14px;font-weight:1000;letter-spacing:-2px}.green{color:#168a40}.red{color:var(--red)}.lead{font-size:24px;line-height:1.55;margin:0;color:var(--sub);font-weight:900}.three{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:28px}.rule{background:var(--soft);border:2px solid var(--line);border-radius:26px;padding:22px;text-align:center;min-height:190px;display:flex;flex-direction:column;align-items:center;justify-content:center}.icon{font-size:46px;margin-bottom:12px}.rule b{font-size:30px;line-height:1.22;display:block}.rule p{font-size:18px;line-height:1.55;color:var(--sub);font-weight:800;margin:12px 0 0}.emergency{margin-top:22px;background:linear-gradient(135deg,#fff8d7,#ffffff);border:2px solid rgba(255,212,59,.75);border-radius:26px;padding:22px;text-align:center;font-size:28px;font-weight:1000;line-height:1.45}.actions{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:22px}.btn{display:flex;align-items:center;justify-content:center;text-decoration:none;border-radius:999px;padding:20px 22px;min-height:72px;font-size:26px;font-weight:1000}.primary{background:linear-gradient(135deg,var(--green),#15803d);color:#fff;box-shadow:0 14px 28px rgba(34,197,94,.25)}.secondary{background:#eef7ff;color:var(--blue);border:2px solid rgba(38,132,255,.25)}.footer{margin-top:16px;color:#6b7f96;text-align:center;font-size:17px;font-weight:800;line-height:1.6}@media(max-width:760px){body{padding:12px;align-items:flex-start}.page{padding:20px;border-radius:28px}.hero{grid-template-columns:1fr;text-align:center}.robot{width:210px;height:210px;margin:auto}.three{grid-template-columns:1fr}.rule{min-height:150px}.actions{grid-template-columns:1fr}h1{font-size:42px}.lead{font-size:22px}.emergency{font-size:24px}}
  </style>
</head>
<body>
  <main class="page" aria-label="遇到詐騙怎麼辦">
    <section class="hero">
      <img class="robot" src="hero.png" alt="AI 防詐守門員">
      <div>
        <div class="eyebrow">AI 守門員提醒</div>
        <h1>看到可疑訊息，<br><span class="green">先停一下</span></h1>
        <p class="lead">不要急著按、不要急著輸入資料。先問家人，或直接打 165。</p>
      </div>
    </section>

    <section class="three" aria-label="三個防詐重點">
      <article class="rule"><div class="icon">🔐</div><b>驗證碼<br><span class="red">不要給</span></b><p>銀行、警察、客服都不會跟你要驗證碼。</p></article>
      <article class="rule"><div class="icon">💸</div><b>要匯款<br><span class="red">先查證</span></b><p>不管對方說多急，都先打電話問家人。</p></article>
      <article class="rule"><div class="icon">⏰</div><b>一直催<br><span class="red">更可疑</span></b><p>說不能告訴別人，通常就是詐騙警訊。</p></article>
    </section>

    <div class="emergency">不確定？直接撥打 <span class="red">165</span>，不要自己判斷。</div>

    <div class="actions">
      <a class="btn primary" href="popup.html">檢查目前網頁</a>
      <a class="btn secondary" href="https://www.google.com">安全離開</a>
    </div>

    <div class="footer">AI 防詐盾牌會自動攔截高風險網頁；這一頁只教你遇到可疑訊息時怎麼做。</div>
  </main>
</body>
</html>
