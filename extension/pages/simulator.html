        </div>

        <div id="lesson-video-card" class="lesson-video-card" aria-label="防詐影片教材"><div class="lesson-video-top"><div><div id="lesson-video-title" class="lesson-video-title">影片教材載入中...</div><div id="lesson-video-desc" class="lesson-video-desc">請先觀看阿盾老師的防詐影片，再進入互動練習。</div><div id="lesson-progress" class="lesson-progress">第 1 課 / 共 5 課</div></div><div id="lesson-video-tag" class="lesson-video-tag">影片教材</div></div><video id="lesson-video-player" class="lesson-video-player" controls preload="metadata" playsinline><source id="lesson-video-source" src="../assets/videos/lesson1-fake-claim.mp4" type="video/mp4">您的瀏覽器不支援影片播放。</video><div class="lesson-video-actions"><div id="lesson-video-note" class="lesson-video-note">看完影片後，按「開始互動練習」回答阿盾老師的問題。</div><button type="button" id="start-practice-btn" class="primary lesson-start-btn">開始互動練習</button></div></div>

        <div id="practice-area" class="lesson-lock practice-layout">
          <div class="practice-story-card">
            <div id="scenario-title" class="scenario-title">載入中...</div>
            <div id="scenario-meta" class="scenario-meta"></div>
            <div id="chat-box" class="chat" aria-live="polite" aria-relevant="additions text"></div>
          </div>

          <aside class="side practice-coach-card" aria-label="阿盾老師提醒">
            <div class="score-card">
              <div class="score-title">🛡️ 阿盾老師提醒</div>
              <div id="score-icon" class="score-icon" aria-hidden="true"><img src="../assets/images/adhun-teacher.png" alt="" class="score-adhun-img"></div>
              <div id="score-num" class="score-num"></div>
              <div id="score-label" class="score-label">先看題目，再選擇你的做法</div>
              <div class="bar"><div id="score-bar" class="bar-fill"></div></div>
              <details id="coach-detail" class="coach-detail" open>
                <summary>阿盾判斷</summary>
                <ul id="reason-list" class="reason-list"><li>選擇做法後，阿盾老師會提醒你哪裡安全、哪裡危險。</li></ul>
              </details>
            </div>

            <div class="score-card">
              <div class="score-title">這題要記住</div>
              <details id="lesson-detail" class="coach-detail" open>
                <summary>學習重點</summary>
                <ul id="lesson-list" class="reason-list"></ul>
              </details>
              <p class="small">重點不是考分數，而是記住：先停、再查、再問可信任的人。</p>
            </div>
          </aside>

          <div class="practice-choice-card">
            <div class="quick-hint">請選擇你的做法：</div>
            <div class="quick elder-choice" aria-label="長輩安全選項">
              <button type="button" class="secondary" id="quick-verify">✅ 我先查證<br>官方來源</button>
              <button type="button" class="secondary" id="quick-family">👨‍👩‍👧 我先問<br>家人確認</button>
              <button type="button" class="secondary" id="quick-refuse">🔒 我不提供<br>資料</button>
              <button type="button" class="danger" id="quick-risky">⚠️ 我直接<br>照做</button>
            </div>
            <div class="input-row">
              <textarea id="user-input" placeholder="系統保留欄位，長輩版不用打字"></textarea>
              <button type="button" id="voice-btn" class="voice" aria-pressed="false">🎙️ 語音</button>
              <button type="button" id="send-btn" class="primary">送出</button>
            </div>
          </div>

          <div class="actions practice-actions-card">
            <button type="button" id="next-btn" class="green">下一題</button>
            <button type="button" id="restart-btn" class="secondary">重看這題</button>
          </div>
        </div>
      </section>
    </section>
  </main>
  <script src="../scripts/simulator.js?v=course-challenge-v1"></script>
</body>
</html>
