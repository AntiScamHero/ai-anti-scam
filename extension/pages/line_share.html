<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>AI 防詐盾牌｜傳給家人</title>
    <style>
        :root {
            --ink: #153047;
            --muted: #607a91;
            --blue: #2276e3;
            --green: #06c755;
            --line: #d9e8f5;
            --shadow: 0 18px 44px rgba(47, 89, 130, .12);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Microsoft JhengHei", "Segoe UI", system-ui, sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 12% 8%, rgba(255, 247, 222, .9), transparent 28%),
                radial-gradient(circle at 92% 12%, rgba(98, 217, 173, .25), transparent 28%),
                linear-gradient(180deg, #ffffff 0%, #f4fbff 52%, #fffaf0 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            width: min(660px, 100%);
            padding: 30px;
            border-radius: 28px;
            background: rgba(255,255,255,.94);
            border: 1px solid var(--line);
            box-shadow: var(--shadow);
        }
        .badge {
            display: inline-flex;
            padding: 7px 12px;
            border-radius: 999px;
            background: #f2fff9;
            color: #148254;
            border: 1px solid rgba(98,217,173,.35);
            font-size: 14px;
            font-weight: 900;
        }
        h1 { margin: 14px 0 8px; font-size: 34px; line-height: 1.2; }
        p {
            color: var(--muted);
            font-size: 17px;
            line-height: 1.65;
            font-weight: 750;
        }
        .code-box {
            margin: 18px 0;
            padding: 20px;
            border-radius: 18px;
            background: #f8fbff;
            border: 1px dashed #93c5fd;
            text-align: center;
        }
        .code {
            font-family: "Courier New", monospace;
            font-size: 38px;
            font-weight: 1000;
            letter-spacing: 8px;
            color: #0f172a;
        }
        textarea {
            width: 100%;
            min-height: 150px;
            resize: vertical;
            padding: 16px;
            border-radius: 18px;
            border: 1px solid #cfe0ef;
            font-family: inherit;
            font-size: 17px;
            line-height: 1.6;
            color: var(--ink);
            background: #ffffff;
        }
        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 16px;
        }
        button, a.button {
            min-height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 13px 16px;
            border: 0;
            border-radius: 16px;
            text-decoration: none;
            font-family: inherit;
            font-size: 17px;
            font-weight: 900;
            cursor: pointer;
        }
        .btn-green { color: #fff; background: linear-gradient(135deg, #06c755, #20b95d); }
        .btn-blue { color: #fff; background: linear-gradient(135deg, #2276e3, #38bdf8); }
        .btn-gray { color: #fff; background: linear-gradient(135deg, #6d8497, #43586b); }
        .note {
            margin-top: 16px;
            padding: 14px;
            border-radius: 16px;
            background: #fff7ed;
            color: #9a531d;
            font-size: 15px;
            font-weight: 850;
            line-height: 1.55;
        }
        @media (max-width: 640px) {
            .actions { grid-template-columns: 1fr; }
            h1 { font-size: 28px; }
            .code { font-size: 32px; }
        }
    </style>
</head>
<body>
    <main class="card">
        <div class="badge">傳給家人</div>
        <h1>家庭守護邀請碼</h1>
        <p>已幫你準備好邀請訊息。按「複製邀請訊息」後貼到 LINE 給家人即可。</p>

        <div class="code-box">
            <div class="code" id="code">------</div>
        </div>

        <textarea id="message" readonly></textarea>

        <div class="actions">
            <button class="btn-blue" id="copy-message">複製邀請訊息</button>
            <a class="button btn-green" id="open-line" href="#">開啟 LINE</a>
            <button class="btn-gray" id="close-page">關閉</button>
        </div>

        <div class="note">
            這頁只保留一個分享流程：複製邀請訊息，再貼到 LINE 聊天室。若 LINE 沒有自動帶入文字，請直接貼上即可。
        </div>
    </main>

    <script src="../scripts/line_share.js"></script>
</body>
</html>
