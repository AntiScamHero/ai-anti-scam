<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 防詐盾牌｜開始守護</title>
  <script src="config.js"></script>
  <script defer src="welcome_robot.js"></script>
  <style>
    :root {
      --bg-a: #eef9ff;
      --bg-b: #f6fff2;
      --card: rgba(255,255,255,.94);
      --ink: #103052;
      --sub: #526b83;
      --blue: #2388ff;
      --green: #21c55d;
      --yellow: #ffd84d;
      --line: rgba(35,136,255,.18);
      --soft-blue: rgba(35,136,255,.10);
      --soft-green: rgba(33,197,93,.12);
      --shadow: rgba(22,74,132,.18);
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      min-height: 100vh;
    }

    body {
      font-family: "Microsoft JhengHei", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 14% 10%, rgba(35,136,255,.22), transparent 30%),
        radial-gradient(circle at 86% 18%, rgba(33,197,93,.20), transparent 27%),
        radial-gradient(circle at 50% 96%, rgba(255,216,77,.26), transparent 32%),
        linear-gradient(135deg, var(--bg-a), var(--bg-b));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .page { width: min(1080px, 100%); }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 36px;
      padding: clamp(24px, 4vw, 44px);
      box-shadow: 0 28px 70px var(--shadow);
      overflow: hidden;
      position: relative;
      backdrop-filter: blur(12px);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: auto -90px -130px auto;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: rgba(255,216,77,.30);
      filter: blur(5px);
      pointer-events: none;
    }

    .hero {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(24px, 4vw, 52px);
      align-items: center;
    }

    .robot-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, rgba(35,136,255,.12), rgba(33,197,93,.10));
      border: 1px solid rgba(35,136,255,.14);
      border-radius: 32px;
      padding: 30px 24px 22px;
      min-height: 500px;
      position: relative;
      overflow: hidden;
    }

    .robot-wrap::after {
      content: "";
      position: absolute;
      width: 180px;
      height: 180px;
      right: -70px;
      bottom: -64px;
      border-radius: 50%;
      background: rgba(33,197,93,.16);
      pointer-events: none;
    }

    .robot-stage {
      width: 100%;
      max-width: 390px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 1;
    }

    .robot-bubble {
      width: 100%;
      min-height: 96px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: #ffffff;
      border: 3px solid rgba(35,136,255,.26);
      border-radius: 28px;
      padding: 15px 18px;
      margin-bottom: 18px;
      box-shadow: 0 16px 34px rgba(35,136,255,.16);
      color: #103052;
      font-size: clamp(19px, 2vw, 23px);
      line-height: 1.45;
      font-weight: 1000;
      word-break: break-word;
    }

    .robot-bubble::after {
      content: "";
      position: absolute;
      top: 107px;
      left: 50%;
      transform: translateX(-50%) rotate(45deg);
      width: 18px;
      height: 18px;
      background: #ffffff;
      border-right: 3px solid rgba(35,136,255,.26);
      border-bottom: 3px solid rgba(35,136,255,.26);
    }

    .robot {
      width: min(385px, 72vw);
      max-width: 100%;
      filter: drop-shadow(0 24px 32px rgba(35,136,255,.24));
      animation: robotFloat 4.2s ease-in-out infinite;
      transform-origin: center bottom;
    }

    .robot.is-talking {
      animation: robotTalk .55s ease-in-out, robotFloat 4.2s ease-in-out infinite .55s;
    }

    @keyframes robotFloat {
      0%, 100% { transform: translateY(0) rotate(-1deg); }
      50% { transform: translateY(-13px) rotate(1deg); }
    }

    @keyframes robotTalk {
      0% { transform: translateY(0) scale(1) rotate(0deg); }
      28% { transform: translateY(-4px) scale(1.055) rotate(-2deg); }
      70% { transform: translateY(-2px) scale(1.035) rotate(2deg); }
      100% { transform: translateY(0) scale(1) rotate(0deg); }
    }

    .redirect-panel {
      width: 100%;
      margin-top: 18px;
      background: rgba(255,255,255,.74);
      border: 1px solid rgba(35,136,255,.16);
      border-radius: 18px;
      padding: 13px 14px;
      box-shadow: 0 10px 24px rgba(22,74,132,.07);
    }

    .redirect-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
      color: var(--sub);
      font-size: 15px;
      font-weight: 900;
    }

    .countdown {
      color: var(--blue);
      font-size: 20px;
      font-weight: 1000;
      min-width: 2.2em;
      text-align: right;
    }

    .progress-track {
      width: 100%;
      height: 9px;
      background: rgba(35,136,255,.12);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--blue), var(--green));
      border-radius: 999px;
      transition: width .9s linear;
    }

    .content { min-width: 0; padding-right: 8px; }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 13px;
      border-radius: 999px;
      background: var(--soft-blue);
      color: #1767c8;
      font-size: 15px;
      font-weight: 900;
      margin-bottom: 14px;
    }

    h1 {
      font-size: clamp(38px, 5vw, 58px);
      line-height: 1.08;
      margin: 0 0 16px;
      letter-spacing: -1.4px;
      font-weight: 1000;
      color: var(--ink);
    }

    .lead {
      font-size: clamp(21px, 2.4vw, 28px);
      line-height: 1.55;
      color: #244762;
      font-weight: 900;
      margin: 0 0 22px;
    }

    .support-note {
      background: #fff8d9;
      border: 2px solid rgba(255,216,77,.72);
      border-radius: 24px;
      padding: 16px 18px;
      font-size: clamp(18px, 2vw, 22px);
      line-height: 1.5;
      font-weight: 1000;
      color: #624500;
      margin-bottom: 20px;
      box-shadow: 0 14px 28px rgba(255,216,77,.16);
    }

    .tips {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin: 24px 0 0;
    }

    .tip {
      background: #ffffff;
      border: 1px solid rgba(35,136,255,.16);
      border-radius: 22px;
      padding: 18px 16px;
      min-height: 132px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      box-shadow: 0 12px 28px rgba(22,74,132,.08);
    }

    .tip-icon { font-size: 31px; margin-bottom: 9px; }

    .tip-title {
      font-size: 21px;
      line-height: 1.25;
      font-weight: 1000;
      color: var(--ink);
      margin-bottom: 6px;
    }

    .tip-text {
      font-size: 15px;
      line-height: 1.45;
      font-weight: 800;
      color: var(--sub);
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 28px;
    }

    a {
      min-height: 58px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 22px;
      border-radius: 999px;
      text-decoration: none;
      font-size: 18px;
      font-weight: 1000;
      transition: transform .16s ease, filter .16s ease;
    }

    a:hover,
    a:focus-visible {
      transform: translateY(-1px);
      filter: brightness(1.04);
      outline: none;
    }

    .primary {
      background: linear-gradient(135deg, var(--green), #12833b);
      color: white;
      box-shadow: 0 14px 28px rgba(33,197,93,.28);
      flex: 1 1 210px;
    }

    .secondary {
      background: var(--soft-blue);
      color: #1767c8;
      border: 1px solid rgba(35,136,255,.20);
      flex: 1 1 180px;
    }

    .footer {
      position: relative;
      z-index: 1;
      margin-top: 22px;
      color: var(--sub);
      font-size: 16px;
      line-height: 1.65;
      font-weight: 800;
      text-align: center;
    }

    @media (max-width: 900px) {
      body { padding: 16px; align-items: flex-start; }
      .card { border-radius: 28px; }
      .hero { grid-template-columns: 1fr; text-align: center; }
      .robot-wrap { min-height: auto; padding: 24px 16px 18px; }
      .robot-stage { max-width: 340px; }
      .robot { width: min(315px, 80vw); }
      .content { padding-right: 0; }
      .tips { grid-template-columns: 1fr; }
      .tip { min-height: auto; }
      .actions { flex-direction: column; }
      a { width: 100%; }
    }

    @media (prefers-reduced-motion: reduce) {
      .robot { animation: none; }
      .robot.is-talking { animation: none; }
      *, *::before, *::after { transition-duration: .001ms !important; }
    }
  </style>
</head>
<body>
  <main class="page" aria-label="AI 防詐盾牌歡迎頁">
    <section class="card">
      <div class="hero">
        <div class="robot-wrap">
          <div class="robot-stage">
            <div id="robot-bubble" class="robot-bubble" aria-live="polite">
              先停一下，別急著操作。
            </div>
            <img class="robot" id="assistant-robot" src="hero.png" alt="AI 防詐盾牌守護機器人">
            <div class="redirect-panel" aria-label="安全上網倒數">
              <div class="redirect-row">
                <span>準備帶你前往安全頁面</span>
                <span id="countdown-text" class="countdown">8</span>
              </div>
              <div class="progress-track" aria-hidden="true">
                <div id="redirect-progress" class="progress-bar"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="content">
          <div class="eyebrow">🛡️ AI 防詐盾牌</div>
          <h1>看到可疑網頁，先停一下</h1>
          <p class="lead">不要急著輸入資料，也不要照著對方指示匯款。</p>

          <div class="support-note">
            機器人會提醒你慢下來；遇到危險頁面時，系統會跳出大字警示與語音提醒。
          </div>

          <div class="actions">
            <a id="start-safe-browsing" class="primary" href="https://www.google.com">開始安全上網</a>
            <a class="secondary" href="simulator.html">進入防詐教室</a>
          </div>
        </div>
      </div>

      <section class="tips" aria-label="防詐重點">
        <article class="tip">
          <div class="tip-icon">🔐</div>
          <div class="tip-title">驗證碼不要給</div>
          <div class="tip-text">這是登入或轉帳的鑰匙。</div>
        </article>

        <article class="tip">
          <div class="tip-icon">💸</div>
          <div class="tip-title">要匯款先查證</div>
          <div class="tip-text">先打官方電話，不照陌生人指示。</div>
        </article>

        <article class="tip">
          <div class="tip-icon">⏰</div>
          <div class="tip-title">一直催更可疑</div>
          <div class="tip-text">越急越要慢下來，先問家人。</div>
        </article>
      </section>

      <div class="footer">
        不確定時，請撥打 165，或請家人一起確認。
      </div>
    </section>
  </main>
</body>
</html>
