<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 防詐盾牌｜防護啟動中</title>

    <style>
        :root {
            --bg-a: #eef8ff;
            --bg-b: #fff8df;
            --bg-c: #f2fff4;
            --card: rgba(255, 255, 255, 0.96);
            --ink: #102a43;
            --sub: #38556e;
            --blue: #1f74e8;
            --blue-dark: #1557b0;
            --green: #16a34a;
            --green-dark: #0f7a35;
            --yellow: #fff3b0;
            --line: rgba(31, 116, 232, 0.15);
            --shadow: rgba(40, 92, 150, 0.12);
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100vh; 
            font-family: "Microsoft JhengHei", "Segoe UI", system-ui, sans-serif;
            color: var(--ink);
            background: linear-gradient(135deg, var(--bg-a), var(--bg-b) 52%, var(--bg-c));
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .page-container {
            width: min(1200px, 95vw);
            background: var(--card);
            border: 2px solid var(--line);
            border-radius: 32px;
            box-shadow: 0 20px 60px var(--shadow);
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 50px;
            padding: 60px;
            align-items: center;
        }

        .left-col {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .badge {
            align-self: flex-start;
            padding: 12px 24px;
            border-radius: 999px;
            background: rgba(22, 163, 74, 0.12);
            color: var(--green-dark);
            border: 1px solid rgba(22, 163, 74, 0.22);
            font-size: 28px;
            font-weight: 900;
        }

        h1 {
            margin: 0;
            font-size: 50px;
            line-height: 1.25;
            color: var(--ink);
            font-weight: 1000;
        }

        .status-box {
            background: var(--yellow);
            border: 2px solid rgba(255, 183, 3, 0.4);
            border-radius: 20px;
            padding: 30px;
            color: #5f3b00;
            font-size: 36px;
            font-weight: 1000;
            text-align: center;
            box-shadow: 0 8px 20px rgba(255, 183, 3, 0.15);
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 16px;
        }

        .btn {
            width: 100%;
            padding: 24px;
            border: 0;
            border-radius: 18px;
            font-size: 32px;
            font-weight: 900;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: transform 0.1s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--blue), var(--blue-dark));
            color: #fff;
            box-shadow: 0 12px 24px rgba(31, 116, 232, 0.2);
        }
        .btn-primary:hover { transform: translateY(-2px); }

        .btn-muted {
            background: transparent;
            border: none;
            color: var(--sub);
            text-decoration: underline;
            font-size: 28px;
            padding: 10px;
        }

        /* === 新增：靜默家庭守護狀態列 === */
        .family-status {
            margin-top: 10px;
            font-size: 24px;
            color: var(--sub);
            font-weight: 800;
            background: rgba(16, 42, 67, 0.05);
            padding: 18px 24px;
            border-radius: 16px;
            text-align: center;
            transition: all 0.4s ease;
        }
        
        .family-status.success {
            background: rgba(22, 163, 74, 0.1);
            color: var(--green-dark);
        }

        .right-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            padding-left: 30px;
            border-left: 2px dashed var(--line);
        }

        .robot-img {
            width: 100%;
            max-width: 280px;
            height: auto;
            filter: drop-shadow(0 15px 25px rgba(31, 116, 232, 0.15));
            animation: float 4s ease-in-out infinite;
            z-index: 2;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .slogan-bubble {
            position: relative;
            background: #ffffff;
            border: 3px solid var(--blue);
            border-radius: 24px;
            padding: 24px 30px;
            box-shadow: 0 12px 30px rgba(31, 116, 232, 0.15);
            text-align: center;
            margin-top: -10px;
            width: 100%;
            min-height: 140px; 
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .slogan-bubble::before {
            content: '';
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 0 15px 15px 15px;
            border-style: solid;
            border-color: transparent transparent var(--blue) transparent;
        }
        
        .slogan-bubble::after {
            content: '';
            position: absolute;
            top: -11px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 0 12px 12px 12px;
            border-style: solid;
            border-color: transparent transparent #ffffff transparent;
        }

        .slogan-title {
            color: var(--blue-dark);
            font-size: 24px;
            font-weight: 900;
            margin-bottom: 12px;
            display: block;
        }

        .slogan-text {
            color: var(--ink);
            font-size: 32px;
            font-weight: 1000;
            line-height: 1.4;
            margin: 0;
            letter-spacing: 2px;
            transition: opacity 0.5s ease-in-out;
            opacity: 1;
        }

        .safe-list {
            margin: 0;
            padding: 0;
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
        }

        .safe-list li {
            display: flex;
            gap: 16px;
            align-items: center;
            padding: 16px 20px;
            border-radius: 16px;
            background: rgba(31, 116, 232, 0.04);
            color: var(--ink);
            font-size: 26px;
            font-weight: 800;
            line-height: 1.4;
        }

        .check {
            width: 36px;
            height: 36px;
            display: grid;
            place-items: center;
            border-radius: 50%;
            background: rgba(22, 163, 74, 0.16);
            color: var(--green-dark);
            flex-shrink: 0;
            font-size: 20px;
        }

        @media (max-width: 960px) {
            .page-container {
                grid-template-columns: 1fr;
                border-left: none;
            }
            .right-col {
                padding-left: 0;
                border-left: none;
                border-top: 2px dashed var(--line);
                padding-top: 40px;
            }
        }
    

        /* 新版 AI 守護公仔素材 */
        .robot-img {
            object-fit: contain;
        }
    </style>
</head>
<body>

    <main class="page-container">
        
        <div class="left-col">
            <div class="badge">✅ 安全守護中</div>
            <h1>AI 防詐盾牌已開始守護您</h1>
            
            <div class="status-box" id="status-text">
                10 秒後會自動進入安全上網模式
            </div>

            <nav class="actions">
                <button class="btn btn-primary" id="start-now-btn">現在就開始安全上網</button>
                <button class="btn btn-muted" id="pause-auto-btn">先讓我看一下</button>
            </nav>

            <div class="family-status" id="family-status-text" aria-live="polite">
                🔄 正在為您準備家庭守護...
            </div>
        </div>

        <div class="right-col">
            <img class="robot-img" src="mascot-boy-new.png" alt="新版 AI 防詐守護公仔" draggable="false">
            
            <div class="slogan-bubble">
                <span class="slogan-title">💡 機器人防詐小口訣</span>
                <p class="slogan-text" id="slogan-text"></p>
            </div>
            
            <ul class="safe-list">
                <li><span class="check">✓</span><span>您可以照常上網。</span></li>
                <li><span class="check">✓</span><span>我會在旁邊幫您看網頁。</span></li>
                <li><span class="check">✓</span><span>遇到可疑網站時，才會跳出提醒。</span></li>
            </ul>
        </div>

    </main>

    <script src="welcome.js"></script>
</body>
</html>
