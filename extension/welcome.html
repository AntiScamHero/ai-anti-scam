<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 防詐盾牌 - 安裝完成</title>

    <style>
        :root {
            --bg: #eef5fb;
            --card: #ffffff;
            --text-main: #17324d;
            --text-sub: #526b83;
            --brand: #1a73e8;
            --brand-dark: #0d47a1;
            --green: #1e8e3e;
            --border: rgba(26, 115, 232, 0.16);
            --shadow: rgba(28, 76, 120, 0.16);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Microsoft JhengHei", "Segoe UI", Roboto, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(52, 199, 89, 0.14), transparent 34%),
                radial-gradient(circle at top right, rgba(26, 115, 232, 0.18), transparent 34%),
                linear-gradient(135deg, #f7fbff 0%, var(--bg) 100%);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .welcome-card {
            width: min(900px, 100%);
            background: rgba(255, 255, 255, 0.94);
            border: 1px solid var(--border);
            border-radius: 28px;
            box-shadow: 0 24px 80px var(--shadow);
            padding: 42px;
            display: grid;
            grid-template-columns: 1.15fr 0.85fr;
            gap: 36px;
            align-items: center;
            backdrop-filter: blur(12px);
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(26, 115, 232, 0.08);
            color: var(--brand);
            font-size: 14px;
            font-weight: 900;
            margin-bottom: 18px;
        }

        h1 {
            margin: 0;
            font-size: clamp(32px, 5vw, 54px);
            line-height: 1.12;
            letter-spacing: -0.04em;
        }

        .lead {
            margin: 18px 0 0;
            color: var(--text-sub);
            font-size: 18px;
            line-height: 1.8;
            font-weight: 650;
        }

        .feature-list {
            margin: 28px 0 0;
            padding: 0;
            list-style: none;
            display: grid;
            gap: 12px;
        }

        .feature-list li {
            display: flex;
            gap: 10px;
            align-items: flex-start;
            color: var(--text-main);
            font-size: 16px;
            line-height: 1.6;
            font-weight: 750;
        }

        .feature-list span {
            flex: 0 0 auto;
            display: inline-grid;
            place-items: center;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(30, 142, 62, 0.12);
            color: var(--green);
            font-size: 14px;
            margin-top: 1px;
        }

        .actions {
            margin-top: 34px;
        }

        .primary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: min(360px, 100%);
            min-height: 58px;
            padding: 16px 26px;
            border-radius: 16px;
            color: #ffffff;
            background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
            text-decoration: none;
            font-size: 18px;
            font-weight: 900;
            box-shadow: 0 14px 32px rgba(26, 115, 232, 0.28);
            transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
        }

        .primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 18px 40px rgba(26, 115, 232, 0.36);
            filter: brightness(1.04);
        }

        .secondary-learning-link {
            margin-top: 16px;
            text-align: center;
            width: min(360px, 100%);
        }

        .secondary-learning-link a {
            color: #526b83;
            font-size: 15px;
            font-weight: 800;
            text-underline-offset: 4px;
        }

        .visual {
            min-height: 360px;
            border-radius: 26px;
            background:
                radial-gradient(circle at 72% 18%, rgba(26, 115, 232, 0.18), transparent 22%),
                linear-gradient(180deg, rgba(26, 115, 232, 0.08), rgba(52, 199, 89, 0.08));
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .shield {
            width: 190px;
            height: 220px;
            border-radius: 48% 48% 42% 42%;
            background: linear-gradient(145deg, #ffffff 0%, #dff0ff 100%);
            border: 3px solid rgba(26, 115, 232, 0.26);
            box-shadow: 0 20px 50px rgba(26, 115, 232, 0.16);
            position: relative;
            display: grid;
            place-items: center;
        }

        .shield::before {
            content: "🛡️";
            font-size: 84px;
            filter: drop-shadow(0 10px 14px rgba(26, 115, 232, 0.18));
        }

        .bubble {
            position: absolute;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid rgba(26, 115, 232, 0.18);
            box-shadow: 0 14px 34px rgba(28, 76, 120, 0.12);
        }

        .bubble.one {
            width: 72px;
            height: 72px;
            left: 36px;
            top: 44px;
        }

        .bubble.two {
            width: 52px;
            height: 52px;
            right: 48px;
            bottom: 56px;
        }

        .bubble.three {
            width: 34px;
            height: 34px;
            right: 82px;
            top: 84px;
        }

        .note {
            margin-top: 22px;
            padding: 14px 16px;
            border-radius: 16px;
            background: rgba(26, 115, 232, 0.06);
            color: var(--text-sub);
            font-size: 14px;
            line-height: 1.7;
            font-weight: 650;
        }

        @media (max-width: 760px) {
            .welcome-card {
                grid-template-columns: 1fr;
                padding: 28px;
            }

            .visual {
                min-height: 240px;
                order: -1;
            }

            .shield {
                width: 140px;
                height: 164px;
            }

            .shield::before {
                font-size: 62px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                transition: none !important;
                animation: none !important;
            }
        }
    </style>
</head>

<body>
    <main class="welcome-card">
        <section>
            <div class="eyebrow">✅ 安裝完成</div>

            <h1>AI 防詐盾牌已準備好保護你</h1>

            <p class="lead">
                當你遇到可疑連結、假物流、假投資或要求輸入信用卡與驗證碼的頁面時，防詐盾牌會協助判斷風險、提醒你先停一下。
            </p>

            <ul class="feature-list">
                <li><span>✓</span> 可從擴充功能按鈕手動掃描目前頁面。</li>
                <li><span>✓</span> 高風險頁面會顯示攔截提醒與白話原因。</li>
                <li><span>✓</span> 綁定家庭後，可把高風險事件同步到戰情室。</li>
            </ul>

            <div class="actions">
                <a id="start-safe-browsing" class="primary" href="https://www.google.com">
                    開始安全上網
                </a>

                <div class="secondary-learning-link">
                    <a href="simulator.html">
                        想先練習辨識詐騙？進入防詐教室
                    </a>
                </div>
            </div>

            <div class="note">
                提醒：防詐盾牌是輔助判斷工具。遇到要求轉帳、輸入驗證碼、提供信用卡或下載陌生檔案的頁面，請先停止操作並向可信任的人求證。
            </div>
        </section>

        <section class="visual" aria-label="AI 防詐盾牌視覺">
            <div class="bubble one"></div>
            <div class="bubble two"></div>
            <div class="bubble three"></div>
            <div class="shield"></div>
        </section>
    </main>
</body>
</html>
