<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>🚨 AI 防詐英雄 - 網頁已攔截</title>
    <style>
        body {
            background: radial-gradient(circle at center, #2a1b24 0%, #161823 60%, #0d0f16 100%);
            color: #ffffff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box;
        }

        .main-layout { display: flex; flex-direction: row; align-items: center; justify-content: center; max-width: 1100px; width: 100%; gap: 40px; flex-wrap: wrap; }
        .left-col { flex: 1; display: flex; flex-direction: column; align-items: center; position: relative; min-width: 350px; }

        .speech-bubble {
            background: #ffffff; border-radius: 12px; padding: 15px 25px; font-size: 20px; font-weight: bold;
            color: #1a365d; text-align: center; margin-bottom: 20px; position: relative; z-index: 2;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); line-height: 1.5; border: 2px solid #4a90e2; cursor: pointer; transition: transform 0.2s;
        }
        .speech-bubble:hover { transform: scale(1.03); }
        .speech-bubble::after { content: ''; position: absolute; bottom: -12px; right: 30%; border-width: 12px 12px 0; border-style: solid; border-color: #ffffff transparent transparent transparent; z-index: 3; }
        .speech-bubble::before { content: ''; position: absolute; bottom: -15px; right: calc(30% - 1.5px); border-width: 15px 15px 0; border-style: solid; border-color: #4a90e2 transparent transparent transparent; z-index: 1; }
        .robot-img { width: 350px; max-width: 100%; z-index: 1; filter: drop-shadow(0px 10px 20px rgba(0, 195, 255, 0.2)); cursor: pointer; }

        .right-col { flex: 1.2; display: flex; flex-direction: column; align-items: flex-start; min-width: 350px; }
        
        .danger-tag { color: #ff4d4f; font-size: 18px; font-weight: bold; margin-bottom: 5px; letter-spacing: 2px; }
        .risk-score-display { font-size: 32px; font-weight: bold; color: #ffffff; margin-bottom: 10px; }
        .risk-score-display span { font-size: 48px; color: #ff4d4f; text-shadow: 0 0 15px rgba(255, 77, 79, 0.5); }
        
        /* 🚨 直接把通用警告做成醒目的副標題 */
        .warning-subtitle { font-size: 18px; color: #ff4d4f; font-weight: bold; margin-bottom: 20px; line-height: 1.5;}

        .info-box {
            background-color: rgba(30, 35, 45, 0.7); border: 1px solid #3a4a5a; border-radius: 12px;
            padding: 20px; width: 100%; box-sizing: border-box; margin-bottom: 15px; text-align: left; position: relative;
        }

        .btn-165 {
            background-color: rgba(255, 68, 68, 0.1); color: #ff4d4f; border: 1px solid #ff4444; padding: 15px;
            border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; text-decoration: none; display: flex;
            align-items: center; justify-content: center; transition: 0.3s; width: 100%; box-sizing: border-box; margin-bottom: 15px;
        }
        .btn-165:hover { background-color: rgba(255, 68, 68, 0.3); transform: translateY(-2px); }

        .btn-safe {
            background-color: #28a745; color: white; padding: 15px 30px; border-radius: 30px;
            font-size: 20px; font-weight: bold; border: none; cursor: pointer; width: 100%; margin-top: 10px; transition: 0.3s; box-shadow: 0 5px 15px rgba(40, 167, 69, 0.3);
        }
        .btn-safe:hover { background-color: #218838; transform: translateY(-2px); }

        .btn-text {
            background: none; border: none; color: #888888; font-size: 14px; text-decoration: underline; cursor: pointer; width: 100%; margin-top: 15px; transition: 0.3s;
        }
        .btn-text:hover { color: #ffffff; }

        .url-display { margin-top: 30px; font-family: monospace; color: #666666; font-size: 12px; word-break: break-all; width: 100%; max-width: 800px; text-align: center; }

        @keyframes flash { 0% { border-color: #ffc107; } 50% { border-color: #ff4444; } 100% { border-color: #ffc107; } }
        #family-broadcast {
            display: none; margin-bottom: 20px; padding: 15px; background: rgba(255, 193, 7, 0.1); 
            border: 2px solid #ffc107; border-radius: 10px; animation: flash 1s infinite; width: 100%; max-width: 800px; text-align: center;
        }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #222222; padding: 40px; border-radius: 16px; text-align: center; border: 2px solid #FF9900; }
        .modal-number { font-size: 48px; font-weight: bold; color: #FF9900; margin: 20px 0; background: #111; padding: 10px; border-radius: 8px; }

        .pin-input { flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #555; background: #1a1a1a; color: #fff; font-size: 20px; text-align: center; letter-spacing: 10px; outline: none; width: 100%; box-sizing: border-box; }
        .pin-input:focus { border-color: #ff9800; box-shadow: 0 0 8px rgba(255,152,0,0.5); }

        /* 💬 詐騙對話神還原 UI */
        .chat-simulator-wrapper { background: #111; border: 1px solid #333; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .chat-header { font-size: 15px; color: #ffeb3b; font-weight: bold; margin-bottom: 10px; text-align: center; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .chat-container { height: 220px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding-right: 5px; scroll-behavior: smooth; }
        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
        .msg-wrapper { display: flex; flex-direction: column; animation: fadeIn 0.3s ease-in-out; }
        .msg-left { align-items: flex-start; }
        .msg-right { align-items: flex-end; }
        .msg-center { align-items: center; margin-top: 10px; margin-bottom: 5px; }
        .msg-name { font-size: 12px; color: #888; margin-bottom: 4px; padding: 0 5px; }
        .msg-bubble { padding: 10px 14px; border-radius: 16px; font-size: 15px; max-width: 85%; line-height: 1.4; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .bubble-scammer { background: #2c3e50; color: white; border-top-left-radius: 4px; }
        .bubble-victim { background: #4caf50; color: white; border-top-right-radius: 4px; }
        .bubble-system { background: rgba(244, 67, 54, 0.15); border: 1px solid #f44336; color: #ffeb3b; font-size: 13px; font-weight: bold; border-radius: 8px; padding: 8px 15px;}
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .btn-next-msg { background: #ff9800; color: #111; border: none; padding: 10px; border-radius: 8px; font-weight: bold; font-size: 15px; cursor: pointer; width: 100%; transition: 0.2s; margin-top: 10px; }
        .btn-next-msg:hover { background: #ffc107; transform: translateY(-2px); }
        .btn-next-msg:disabled { background: #444; color: #888; cursor: not-allowed; transform: none; }
    </style>
</head>
<body>

    <div id="family-broadcast">
        <h3 style="color: #ff4d4f; margin: 0 0 5px 0;">👨‍👩‍👧 來自家人的緊急通知！</h3>
        <p id="broadcast-message" style="font-size: 1.1em; color: #ddd; margin: 0;">「馬上停止動作！我現在打給你！」</p>
    </div>

    <div class="main-layout">
        
        <div class="left-col">
            <div class="speech-bubble" id="voice-bubble" title="點擊畫面任何地方即可聽取語音">
                各位鄉親長輩，這網頁很危險，<br>
                什麼都會騙！<br>
                趕快離開才安全喔！<span style="font-size: 28px;">🔊</span>
            </div>
            <img src="hero.png" alt="AI 防詐英雄" class="robot-img">
        </div>

        <div class="right-col">
            <div class="danger-tag">威脅攔截成功</div>
            <div class="risk-score-display">危險指數：<span id="score">--</span> 分</div>
            
            <div class="warning-subtitle">
                🚨 警告！此網頁為極度危險的詐騙陷阱，請立刻離開，千萬不要相信！
            </div>
            
            <a href="tel:165" class="btn-165" id="call-btn">📞 有疑慮？撥打 165 反詐騙專線</a>

            <div id="reason-box" style="display:none;"></div><div id="dna-box" style="display:none;"></div><div id="tags-container" style="display:none;"></div><div id="advice" style="display:none;"></div>

            <div class="info-box" id="cooldown-box" style="border-color: #ffeb3b; box-shadow: 0 0 15px rgba(255, 235, 59, 0.1);">
                
                <div class="chat-simulator-wrapper">
                    <div class="chat-header">📱 詐騙情境還原：看看他們都怎麼騙</div>
                    <div class="chat-container" id="chat-history"></div>
                    <button class="btn-next-msg" id="btn-next-msg">👉 點擊看下一句對話...</button>
                </div>
                
                <button class="btn-safe" id="manual-leave-btn">聽從建議，安全離開此網頁</button>
                <button class="btn-safe" id="close-btn" style="display: none;">關閉分頁</button> 

                <button class="btn-text" id="report-false-btn">這不是詐騙，回報誤判</button>
                <button class="btn-text" id="bypass-btn">強制冷靜期... 請先深呼吸 (剩餘 30 秒)</button>

                <div id="password-area" style="display: none; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #555; width: 100%;">
                    <div style="color: #ffeb3b; font-size: 15px; margin-bottom: 10px;">🔒 請輸入家人設定的防護密碼以解除攔截：</div>
                    <div style="display: flex; gap: 10px;">
                        <input type="password" id="guardian-pin" class="pin-input" maxlength="4" inputmode="numeric" pattern="\d*" placeholder="****">
                        <button id="verify-pin-btn" class="btn-safe" style="width: auto; margin-top: 0; padding: 10px 25px; font-size: 16px; background-color: #ff4d4f; box-shadow: 0 5px 15px rgba(255, 77, 79, 0.3);">解鎖</button>
                    </div>
                    <div id="pin-error" style="color: #ff4d4f; font-size: 14px; margin-top: 8px; display: none;">❌ 密碼錯誤！請打電話給設定此防護網的家人確認密碼。</div>
                    <button id="cancel-pin-btn" class="btn-text" style="margin-top: 8px;">← 返回</button>
                </div>
            </div>
        </div>

    </div>

    <div class="url-display">
        <span id="target-url">載入中...</span>
        <span id="original-url"></span>
    </div>

    <div id="desktop-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 style="color:white; margin-top:0;">📱 請使用手機撥打</h2>
            <div class="modal-number" id="modal-phone-number">165</div>
            <button class="btn-safe" id="close-modal-btn" style="width: auto;">我知道了</button>
        </div>
    </div>

    <audio id="hero-audio-zh" src="zh.wav" preload="auto"></audio>
    <audio id="hero-audio-tw" src="tw.wav" preload="auto"></audio>

    <script src="config.js"></script>
    <script src="socket.io.min.js"></script>
    <script src="scenarios.js"></script>
    <script src="blocked.js"></script>
</body>
</html>
