<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>⚠️ AI 防詐盾牌 - 網頁已攔截</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        /* 🚀 新增：科技感主容器 */
        .container {
            background-color: #2d2d2d;
            border-top: 6px solid #ff4d4f;
            border-radius: 12px;
            padding: 40px;
            max-width: 650px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            position: relative;
        }

        .alert-icon { font-size: 80px; margin-bottom: 10px; animation: pulse 1.5s infinite alternate; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.1); opacity: 1; } }

        /* 🚀 升級：危險標題與分數 */
        h1 { color: #ff4d4f; margin: 10px 0; font-size: 28px; }
        .risk-score-display {
            font-size: 42px; font-weight: bold; color: #ff4d4f; margin: 15px 0; 
            text-shadow: 0 0 10px rgba(255, 77, 79, 0.4);
        }

        /* 保留原本的 warning-badge 作為備用顯示 */
        .warning-badge {
            background-color: #FFCC00; color: #000000; padding: 12px 20px;
            border-radius: 8px; font-size: 20px; font-weight: 900; margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(255, 204, 0, 0.3); letter-spacing: 1px;
            display: inline-block;
        }

        .call-btn {
            background: linear-gradient(135deg, #FF9900 0%, #FF8800 100%);
            color: #ffffff; padding: 15px 40px; border-radius: 50px;
            font-size: 22px; font-weight: bold; border: none; cursor: pointer;
            display: inline-flex; align-items: center; justify-content: center; gap: 15px;
            box-shadow: 0 0 30px rgba(255, 153, 0, 0.6); transition: all 0.3s ease;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3); text-decoration: none; margin: 20px 0;
            width: 100%; box-sizing: border-box;
        }
        .call-btn:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 0 40px rgba(255, 153, 0, 0.8); }

        .action-buttons { display: flex; gap: 20px; margin-top: 15px; justify-content: center; width: 100%; }
        
        /* 🚀 升級：安全按鈕樣式 */
        .btn-safe {
            background-color: #ff4d4f; color: white; padding: 12px 30px;
            border-radius: 6px; font-size: 18px; font-weight: bold; border: none;
            cursor: pointer; transition: 0.3s; width: 100%;
        }
        .btn-safe:hover { background-color: #ff7875; }

        .btn-danger {
            background-color: transparent; color: #8b949e; padding: 12px 20px;
            border-radius: 6px; font-size: 14px; border: 1px solid #444;
            cursor: pointer; text-decoration: underline; width: 100%; transition: 0.3s;
        }
        .btn-danger:hover { color: #ff4d4f; border-color: #ff4d4f; }

        .url-display {
            margin-top: 25px; font-family: monospace; color: #8b949e;
            background: #1f1f1f; padding: 12px 20px; border-radius: 6px;
            word-break: break-all; width: 100%; box-sizing: border-box; border: 1px solid #444;
        }
        
        /* 🚀 升級：分析與標籤區塊 */
        .analysis-box {
            background-color: #1f1f1f; border: 1px solid #444; border-radius: 8px; 
            padding: 20px; margin: 20px 0; text-align: left;
        }
        #dna-box, #tags-container { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 15px; }
        .dna-tag, .tag { background-color: rgba(255, 77, 79, 0.2); color: #ff6b6b; padding: 6px 14px; border-radius: 20px; font-size: 14px; font-weight: bold; border: 1px solid rgba(255, 77, 79, 0.5); }

        /* Modal 樣式保留 */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); display: none;
            align-items: center; justify-content: center; z-index: 1000;
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background: #222222; padding: 40px 50px; border-radius: 16px;
            text-align: center; border: 2px solid #FF9900;
            box-shadow: 0 10px 40px rgba(255, 153, 0, 0.3); max-width: 400px; width: 90%;
        }
        .modal-content h2 { margin-top: 0; color: #ffffff; font-size: 24px;}
        .modal-number {
            font-size: 48px; font-weight: bold; color: #FF9900;
            margin: 20px 0; letter-spacing: 2px;
            background: #111; padding: 10px 20px; border-radius: 8px;
            user-select: all; 
        }

        /* 靈魂拷問冷靜區 */
        #cooldown-box {
            margin-top: 20px; padding: 20px; background: #2c2c2c; 
            border-radius: 10px; color: #ffcc00; text-align: left; 
            border: 1px solid #555; width: 100%; box-sizing: border-box;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #cooldown-box label {
            display: block; margin-bottom: 15px; cursor: pointer; font-size: 15px; color: #ddd; line-height: 1.5;
        }
        
        /* 廣播動畫 */
        @keyframes flash { 0% { border-color: #ffc107; box-shadow: 0 0 10px #ffc107; } 50% { border-color: #ff4444; box-shadow: 0 0 20px #ff4444; } 100% { border-color: #ffc107; box-shadow: 0 0 10px #ffc107; } }
        #family-broadcast {
            display: none; margin-bottom: 20px; padding: 20px; background: #ffeeba; 
            border: 3px solid #ffc107; border-radius: 10px; animation: flash 1s infinite;
            width: 100%; box-sizing: border-box; text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div id="family-broadcast">
            <h2 style="color: #d32f2f; margin: 0; margin-bottom: 10px;">👨‍👩‍👧 來自家人的緊急通知！</h2>
            <p id="broadcast-message" style="font-size: 1.2em; font-weight: bold; color: #333; margin: 0;">「馬上停止動作！我現在打給你！」</p>
        </div>

        <div class="alert-icon">🛑</div>
        <h1>保護性攔截啟動</h1>
        <p style="color: #aaa; margin-bottom: 20px;">為保護您的資訊與財產安全，我們已中斷此網頁的連線。</p>

        <div class="warning-badge" id="reason-box" style="display: none;">偵測到危險特徵，已強制攔截！</div>
        <div class="risk-score-display">危險指數: <span id="score">--</span> 分</div>
        
        <div id="dna-box"></div>
        <div id="tags-container"></div>

        <div class="analysis-box">
            <div style="font-size: 16px; line-height: 1.6; color: #ddd;">
                <strong>🔍 攔截原因：</strong><br><span id="reason">系統正在分析此網頁的潛在風險...</span>
            </div>
            <div id="advice" style="font-size: 15px; color: #aaa; margin-top: 10px; font-style: italic;">
                💡 專家建議：請保持冷靜，切勿輸入任何個資。
            </div>
        </div>

        <a href="tel:165" class="call-btn" id="call-btn">
            📞 撥打 165 反詐騙專線
        </a>

        <div id="cooldown-box">
            <h3 style="margin-top: 0; color: #ffcc00; font-size: 18px;">🛑 點擊離開前，請先回想一下：</h3>
            <label><input type="checkbox" class="soul-question"> 對方是否承諾您「保證獲利」或「穩賺不賠」？</label>
            <label><input type="checkbox" class="soul-question"> 是否要求您將資金轉入「個人帳戶」而非公司專戶？</label>
            <label><input type="checkbox" class="soul-question"> 是否教您在銀行匯款時，對行員說謊（如裝潢款、借親友）？</label>
            <button id="wake-up-btn" style="margin-top: 15px; width: 100%; padding: 12px; background: #dc3545; color: white; border: none; border-radius: 5px; display: none; font-size: 16px; font-weight: bold; cursor: pointer;">
                我明白了，這是詐騙，立即關閉網頁
            </button>
        </div>

        <div class="action-buttons">
            <button class="btn-safe" id="manual-leave-btn">離開此網頁 (安全關閉)</button>
            <button class="btn-safe" id="close-btn" style="display: none;">關閉分頁</button> </div>

        <button class="btn-danger" id="bypass-btn" style="margin-top: 20px;">強制冷靜期... 請先深呼吸 (剩餘 30 秒)</button>
        <button class="btn-danger" id="report-false-btn" style="margin-top: 10px; border: none;">這不是詐騙，回報誤判</button>

        <div class="url-display">
            攔截網址：<span id="target-url">載入中...</span>
            <span id="original-url" style="display: none;"></span> </div>
    </div> <div id="desktop-modal" class="modal-overlay">
        <div class="modal-content">
            <h2>📱 請使用您的手機撥打</h2>
            <div class="modal-number" id="modal-phone-number">165</div>
            <p style="color: #cccccc; font-size: 16px; margin-bottom: 30px;">
                為確保安全，請直接拿起您的手機，輸入上方號碼與家人或 165 確認。
            </p>
            <button class="btn-safe" id="close-modal-btn" style="background-color: #1e8e3e;">我知道了</button>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="socket.io.min.js"></script>
    <script src="blocked.js"></script>
</body>
</html>
