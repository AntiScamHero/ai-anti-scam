<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>🚨 AI 防詐英雄 - 網頁已攔截</title>
    <style>
        body { background: radial-gradient(circle at center, #2a1b24 0%, #161823 60%, #0d0f16 100%); color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .main-layout { display: flex; flex-direction: row; align-items: center; justify-content: center; max-width: 1300px; width: 100%; gap: 50px; flex-wrap: wrap; }
        .left-col { flex: 1.2; display: flex; flex-direction: column; align-items: center; position: relative; min-width: 450px; animation: slideUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .speech-bubble { background: #ffffff; border-radius: 15px; padding: 20px 30px; font-size: 24px; font-weight: bold; color: #1a365d; text-align: center; margin-bottom: 25px; position: relative; z-index: 2; box-shadow: 0 8px 25px rgba(0,0,0,0.6); line-height: 1.5; border: 3px solid #4a90e2; cursor: pointer; transition: transform 0.2s; }
        .speech-bubble:hover { transform: scale(1.03); }
        .speech-bubble::after { content: ''; position: absolute; bottom: -15px; right: 25%; border-width: 15px 15px 0; border-style: solid; border-color: #ffffff transparent transparent transparent; z-index: 3; }
        .speech-bubble::before { content: ''; position: absolute; bottom: -19px; right: calc(25% - 2px); border-width: 19px 19px 0; border-style: solid; border-color: #4a90e2 transparent transparent transparent; z-index: 1; }
        .robot-img { width: 550px; max-width: 100%; z-index: 1; filter: drop-shadow(0px 15px 40px rgba(74, 144, 226, 0.45)); }
        
        .right-col { flex: 1; display: flex; flex-direction: column; align-items: flex-start; min-width: 400px; }
        .danger-tag { color: #ff4d4f; font-size: 20px; font-weight: bold; margin-bottom: 5px; letter-spacing: 2px; }
        .risk-score-display { font-size: 36px; font-weight: bold; color: #ffffff; margin-bottom: 10px; }
        .risk-score-display span { font-size: 56px; color: #ff4d4f; text-shadow: 0 0 20px rgba(255, 77, 79, 0.6); }
        .warning-subtitle { font-size: 20px; color: #dddddd; margin-bottom: 25px; }
        
        .info-box { background-color: rgba(30, 35, 45, 0.8); border: 1px solid #3a4a5a; border-radius: 12px; padding: 25px; width: 100%; box-sizing: border-box; margin-bottom: 20px; text-align: left; position: relative; }
        .info-box::before { content: ''; position: absolute; left: -1px; top: 10%; height: 80%; width: 4px; background: #4adcff; border-radius: 5px; box-shadow: 0 0 12px #4adcff; }
        .box-title { font-size: 18px; color: #aaaaaa; margin-bottom: 15px; }
        #reason { font-size: 18px; color: #ffffff; line-height: 1.6; margin-bottom: 20px; }
        
        .btn-165 { background-color: transparent; color: #dddddd; border: 1px solid #555555; padding: 12px 25px; border-radius: 25px; font-size: 18px; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; transition: 0.3s; }
        .btn-165:hover { background-color: #333; border-color: #888; color: white; }
        
        .checkbox-label { display: flex; align-items: flex-start; margin-bottom: 15px; font-size: 16px; color: #cccccc; cursor: pointer; line-height: 1.5; }
        .checkbox-label input { margin-right: 12px; margin-top: 4px; transform: scale(1.2); }
        
        .btn-safe { background-color: #28a745; color: white; padding: 18px 30px; border-radius: 30px; font-size: 22px; font-weight: bold; border: none; cursor: pointer; width: 100%; margin-top: 15px; transition: 0.3s; box-shadow: 0 5px 20px rgba(40, 167, 69, 0.4); }
        .btn-safe:hover { background-color: #218838; transform: translateY(-3px); }
        .btn-text { background: none; border: none; color: #888888; font-size: 16px; text-decoration: underline; cursor: pointer; width: 100%; margin-top: 20px; transition: 0.3s; }
        .btn-text:hover { color: #ffffff; }
        .url-display { margin-top: 40px; font-family: monospace; color: #666666; font-size: 14px; word-break: break-all; width: 100%; max-width: 800px; text-align: center; }
        
        #dna-box, #tags-container, #advice, #reason-box, #original-url { display: none; }
        
        @keyframes flash { 0% { border-color: #ffc107; } 50% { border-color: #ff4444; } 100% { border-color: #ffc107; } }
        #family-broadcast { display: none; margin-bottom: 25px; padding: 20px; background: rgba(255, 193, 7, 0.1); border: 2px solid #ffc107; border-radius: 10px; animation: flash 1s infinite; width: 100%; max-width: 800px; text-align: center; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #222222; padding: 50px; border-radius: 16px; text-align: center; border: 2px solid #FF9900; }
        .modal-number { font-size: 56px; font-weight: bold; color: #FF9900; margin: 25px 0; background: #111; padding: 15px; border-radius: 8px; }
    </style>
</head>
<body>

    <div id="family-broadcast">
        <h3 style="color: #ff4d4f; margin: 0 0 10px 0; font-size: 24px;">👨‍👩‍👧 來自家人的緊急通知！</h3>
        <p id="broadcast-message" style="font-size: 1.3em; color: #ddd; margin: 0;">「馬上停止動作！我現在打給你！」</p>
    </div>

    <div class="main-layout">
        <div class="left-col">
            <div class="speech-bubble" id="voice-bubble" title="點擊重新播放語音">
                鄉親啊～這個網頁有危險喔！<br>防詐小尖兵已經幫您擋下來了，<br>咱趕緊離開，卡安全啦！ <span style="font-size: 28px;">🔊</span>
            </div>
            <img src="hero.png" alt="AI 防詐英雄" class="robot-img">
        </div>

        <div class="right-col">
            <div class="danger-tag">未知套路</div>
            <div class="risk-score-display">危險指數：<span id="score">--</span> 分</div>
            <div class="warning-subtitle">偵測到危險特徵，已強制攔截！</div>
            
            <div id="reason-box"></div><div id="dna-box"></div><div id="tags-container"></div><div id="advice"></div>

            <div class="info-box">
                <div class="box-title">攔截原因：</div>
                <div id="reason">系統正在分析此網頁的潛在風險...</div>
                <a href="tel:165" class="btn-165" id="call-btn">📞 撥打 165 反詐騙專線</a>
            </div>

            <div class="info-box" id="cooldown-box">
                <div class="box-title">點擊離開前請先回想一下：</div>
                <label class="checkbox-label"><input type="checkbox" class="soul-question"> 為什麼這詐騙網頁的危險被發現嗎？</label>
                <label class="checkbox-label"><input type="checkbox" class="soul-question"> 這是詐騙請安全面關卡不錯聽嗎？</label>
                <label class="checkbox-label"><input type="checkbox" class="soul-question"> 請停下來防詐騙點擊詐騙問題嗎？</label>
                
                <button id="wake-up-btn" style="display: none;">我明白了，這是詐騙，立即關閉網頁</button>
                <button class="btn-safe" id="manual-leave-btn">離開此網頁 (安全關閉)</button>
                <button class="btn-safe" id="close-btn" style="display: none;">關閉分頁</button> 
                <button class="btn-text" id="report-false-btn">這不是詐騙，回報誤判</button>
                <button class="btn-text" id="bypass-btn">強制冷靜期... 請先深呼吸 (剩餘 30 秒)</button>
            </div>
        </div>
    </div>

    <div class="url-display">
        <span id="target-url">載入中...</span>
        <span id="original-url"></span>
    </div>

    <div id="desktop-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 style="color:white; margin-top:0; font-size: 32px;">📱 請使用手機撥打</h2>
            <div class="modal-number" id="modal-phone-number">165</div>
            <button class="btn-safe" id="close-modal-btn" style="width: auto;">我知道了</button>
        </div>
    </div>

    <script src="voice.js"></script>
    <script src="config.js"></script>
    <script src="socket.io.min.js"></script>
    <script src="blocked.js"></script>
</body>
</html>
