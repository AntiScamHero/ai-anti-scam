<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>🚨 AI 防詐英雄 - 網頁已攔截</title>
    <style>
        body {
            /* 模擬截圖中的深色漸層背景與微弱紅光 */
            background: radial-gradient(circle at center, #2a1b24 0%, #161823 60%, #0d0f16 100%);
            color: #ffffff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        /* 雙欄式主要排版 */
        .main-layout {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            max-width: 1100px;
            width: 100%;
            gap: 40px;
            flex-wrap: wrap; /* 螢幕太小會自動上下排 */
        }

        /* ================= 左側：英雄區塊 ================= */
        .left-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            min-width: 350px;
        }

        .speech-bubble {
            background: #ffffff;
            border-radius: 12px;
            padding: 15px 25px;
            font-size: 20px;
            font-weight: bold;
            color: #1a365d;
            text-align: center;
            margin-bottom: 20px; 
            position: relative;
            z-index: 2;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            line-height: 1.5;
            border: 2px solid #4a90e2;
        }

        .speech-bubble::after {
            content: ''; position: absolute; bottom: -12px; right: 30%;
            border-width: 12px 12px 0; border-style: solid;
            border-color: #ffffff transparent transparent transparent;
            z-index: 3;
        }
        .speech-bubble::before {
            content: ''; position: absolute; bottom: -15px; right: calc(30% - 1.5px);
            border-width: 15px 15px 0; border-style: solid;
            border-color: #4a90e2 transparent transparent transparent;
            z-index: 1;
        }

        .robot-img {
            width: 350px;
            max-width: 100%;
            z-index: 1;
            filter: drop-shadow(0px 10px 20px rgba(0, 195, 255, 0.2)); /* 加上微微的藍色科技光暈 */
        }

        /* ================= 右側：資訊區塊 ================= */
        .right-col {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            min-width: 350px;
        }

        .danger-tag {
            color: #ff4d4f;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }

        .risk-score-display {
            font-size: 32px; 
            font-weight: bold; 
            color: #ffffff;
            margin-bottom: 10px;
        }
        .risk-score-display span {
            font-size: 48px;
            color: #ff4d4f;
            text-shadow: 0 0 15px rgba(255, 77, 79, 0.5);
        }

        .warning-subtitle {
            font-size: 18px;
            color: #dddddd;
            margin-bottom: 20px;
        }

        /* 資訊卡片通用樣式 */
        .info-box {
            background-color: rgba(30, 35, 45, 0.7);
            border: 1px solid #3a4a5a;
            border-radius: 12px;
            padding: 20px;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 15px;
            text-align: left;
            position: relative;
        }
        /* 卡片左側的發光邊條 */
        .info-box::before {
            content: ''; position: absolute; left: -1px; top: 10%; height: 80%; width: 3px;
            background: #4adcff; border-radius: 5px; box-shadow: 0 0 10px #4adcff;
        }

        .box-title {
            font-size: 16px;
            color: #aaaaaa;
            margin-bottom: 10px;
        }

        #reason {
            font-size: 16px;
            color: #ffffff;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .btn-165 {
            background-color: transparent;
            color: #dddddd;
            border: 1px solid #555555;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }
        .btn-165:hover { background-color: #333; border-color: #888; }

        .checkbox-label {
            display: flex;
            align-items: flex-start;
            margin-bottom: 12px;
            font-size: 15px;
            color: #cccccc;
            cursor: pointer;
            line-height: 1.4;
        }
        .checkbox-label input { margin-right: 10px; margin-top: 3px; }

        .btn-safe {
            background-color: #28a745;
            color: white;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.3);
        }
        .btn-safe:hover { background-color: #218838; transform: translateY(-2px); }

        .btn-text {
            background: none;
            border: none;
            color: #888888;
            font-size: 14px;
            text-decoration: underline;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            transition: 0.3s;
        }
        .btn-text:hover { color: #ffffff; }

        .url-display {
            margin-top: 30px; font-family: monospace; color: #666666;
            font-size: 12px; word-break: break-all; width: 100%; max-width: 800px;
            text-align: center;
        }

        /* 隱藏但保留系統需要的 ID */
        #dna-box, #tags-container, #advice, #reason-box, #original-url { display: none; }

        /* 緊急廣播 */
        @keyframes flash { 0% { border-color: #ffc107; } 50% { border-color: #ff4444; } 100% { border-color: #ffc107; } }
        #family-broadcast {
            display: none; margin-bottom: 20px; padding: 15px; background: rgba(255, 193, 7, 0.1); 
            border: 2px solid #ffc107; border-radius: 10px; animation: flash 1s infinite;
            width: 100%; max-width: 800px; text-align: center;
        }
        
        /* 桌機版 165 彈窗 */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); display: none;
            align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-content {
            background: #222222; padding: 40px; border-radius: 16px;
            text-align: center; border: 2px solid #FF9900;
        }
        .modal-number { font-size: 48px; font-weight: bold; color: #FF9900; margin: 20px 0; background: #111; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

    <div id="family-broadcast">
        <h3 style="color: #ff4d4f; margin: 0 0 5px 0;">👨‍👩‍👧 來自家人的緊急通知！</h3>
        <p id="broadcast-message" style="font-size: 1.1em; color: #ddd; margin: 0;">「馬上停止動作！我現在打給你！」</p>
    </div>

    <div class="main-layout">
        
        <div class="left-col">
            <div class="speech-bubble" id="voice-bubble" title="點擊重新播放語音">
                阿公阿嬤、阿伯阿姨，注意一下喔！<br>
                這個網站是騙人的啦，會騙錢、騙個資。<br>
                防詐小尖兵幫您擋下來了。<br>
                趕快關掉、關掉！這樣才安全喔。<span style="font-size: 28px;">🔊</span>
            </div>
            <img src="hero.png" alt="AI 防詐英雄" class="robot-img">
        </div>

        <div class="right-col">
            <div class="danger-tag">威脅攔截成功</div>
            <div class="risk-score-display">危險指數：<span id="score">--</span> 分</div>
            <div class="warning-subtitle">已為您啟動防詐防護網！</div>
            
            <div id="reason-box"></div><div id="dna-box"></div><div id="tags-container"></div><div id="advice"></div>

            <div class="info-box">
                <div class="box-title">攔截原因：</div>
                <div id="reason">系統正在分析此網頁的潛在風險...</div>
                <a href="tel:165" class="btn-165" id="call-btn">📞 撥打 165 反詐騙專線</a>
            </div>

            <div class="info-box" id="cooldown-box">
                <div class="box-title">點擊離開前請先回想一下：</div>
                <label class="checkbox-label"><input type="checkbox" class="soul-question"> 這份「飆股群組」是否有保證獲利？</label>
                <label class="checkbox-label"><input type="checkbox" class="soul-question"> 是否要求您立刻將資金匯入「個人帳戶」？</label>
                <label class="checkbox-label"><input type="checkbox" class="soul-question"> 您此時是否感到恐慌、興奮或被急迫？</label>
                
                <button id="wake-up-btn" style="display: none;">我明白了，這是詐騙，立即關閉網頁</button>

                <button class="btn-safe" id="manual-leave-btn">聽從建議，安全離開此網頁</button>
                <button class="btn-safe" id="close-btn" style="display: none;">關閉分頁</button> 

                <button class="btn-text" id="report-false-btn">這不是詐騙，回報誤判</button>
                <button class="btn-text" id="bypass-btn">強制冷靜期... 請先深呼吸 (剩餘 30 秒)</button>
            </div>
        </div>

    </div>

    <div class="url-display">
        <span id="target-url">載入中...</span>
        <span id="original-url"></span>
    </div>

    <div id="desktop-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 style="color:white; margin-top:0;">📱 請使用手機撥打</h2>
            <div class="modal-number" id="modal-phone-number">165</div>
            <button class="btn-safe" id="close-modal-btn" style="width: auto;">我知道了</button>
        </div>
    </div>

    <audio id="hero-audio-zh" src="zh.wav" preload="auto"></audio>
    <audio id="hero-audio-tw" src="tw.wav" preload="auto"></audio>

    <script src="voice.js"></script>
    <script src="config.js"></script>
    <script src="socket.io.min.js"></script>
    <script src="blocked.js"></script>
</body>
</html>
