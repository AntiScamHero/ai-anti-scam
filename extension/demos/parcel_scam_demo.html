<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>速達物流｜包裹補繳通知</title><style>body{margin:0;font-family:"Microsoft JhengHei",Arial,sans-serif;background:#f3f7fb;color:#111827}.wrap{max-width:880px;margin:48px auto;background:#fff;border-radius:24px;padding:38px;box-shadow:0 20px 60px rgba(15,23,42,.12)}.logo{font-size:26px;font-weight:1000;color:#1d4ed8;margin-bottom:24px}.notice{background:#fff7ed;border:2px solid #fed7aa;border-radius:18px;padding:20px;color:#9a3412;font-size:21px;font-weight:900;line-height:1.7}h1{font-size:38px;margin:0 0 18px}.text{font-size:22px;line-height:1.8;font-weight:750}.form{margin-top:24px;display:grid;gap:14px}.field{padding:16px;border:2px solid #cbd5e1;border-radius:14px;font-size:18px;color:#64748b;background:#f8fafc}.btn{display:block;text-align:center;margin-top:22px;background:#dc2626;color:#fff;border-radius:16px;padding:18px 24px;font-size:22px;font-weight:1000;text-decoration:none}.small{margin-top:20px;color:#64748b;font-size:13px}</style></head><body><main class="wrap"><div class="logo">速達物流 ExpressCare</div><h1>包裹配送失敗，請立即補繳運費</h1><div class="notice">您的包裹因運費未完成繳納，將於 10 分鐘後退回。請立即完成付款驗證。</div><p class="text">請點擊下方連結，輸入信用卡卡號、CVV 安全碼與簡訊驗證碼，以完成補繳運費 48 元。</p><div class="form"><div class="field">信用卡卡號：請輸入 16 碼</div><div class="field">CVV 安全碼：請輸入卡片背面 3 碼</div><div class="field">簡訊驗證碼：請輸入銀行傳送之 OTP</div></div><a class="btn" href="https://parcel-pay.example.com/verify">立即補繳並驗證信用卡</a><div class="small">本頁為本機競賽模擬展示，不會收集任何資料。</div></main></body></html>
