<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>AI 防詐戰情室 - WebSocket 即時連線版</title>
    <script src="config.js"></script> 
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { margin: 0; padding: 20px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0d1117; color: #c9d1d9; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #30363d; padding-bottom: 15px; margin-bottom: 20px; }
        .header h1 { margin: 0; color: #58a6ff; font-size: 24px; letter-spacing: 2px; }
        
        .control-panel { background: #161b22; padding: 20px; border-radius: 10px; border: 1px solid #30363d; margin-bottom: 20px; display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }
        input { background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; padding: 10px 15px; border-radius: 5px; font-size: 16px; font-weight: bold; letter-spacing: 2px; outline: none; text-align: center; width: 150px; }
        input:focus { border-color: #58a6ff; }
        
        button { border: none; padding: 10px 20px; border-radius: 5px; font-size: 15px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-start { background: #238636; color: white; }
        .btn-start:hover { background: #2ea043; }
        .btn-stop { background: #da3633; color: white; display: none; }
        .btn-stop:hover { background: #f85149; }
        .btn-manual { background: #1f6feb; color: white; }
        .btn-manual:hover { background: #388bfd; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }

        .status-badge { padding: 8px 15px; border-radius: 20px; font-size: 14px; font-weight: bold; background: #30363d; color: #8b949e; transition: 0.3s; }
        .status-connected { background: rgba(35, 134, 54, 0.2); color: #3fb950; border: 1px solid #238636; box-shadow: 0 0 10px rgba(63, 185, 80, 0.4); }
        .status-loading { background: rgba(210, 153, 34, 0.2); color: #d29922; border: 1px solid #d29922; }

        /* 👑 升級版的緊急橫幅動畫 */
        #emergency-banner { display: none; background: linear-gradient(90deg, #da3633 0%, #b32d2a 100%); color: white; padding: 15px 20px; border-radius: 10px; margin-bottom: 20px; font-weight: bold; font-size: 18px; text-align: center; box-shadow: 0 0 25px rgba(218, 54, 51, 0.8); animation: strobe 0.5s infinite alternate; }
        @keyframes strobe { from { opacity: 1; transform: scale(1); } to { opacity: 0.85; transform: scale(1.01); } }

        .dashboard-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; margin-bottom: 20px; }
        .chart-container { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 20px; }
        .chart-title { font-size: 16px; font-weight: bold; color: #8b949e; margin-bottom: 15px; border-bottom: 1px solid #30363d; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center;}
        
        .stats-boxes { display: flex; gap: 15px; margin-bottom: 20px; }
        .stat-box { flex: 1; background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 15px; text-align: center; position: relative; overflow: hidden; }
        .stat-value { font-size: 36px; font-weight: bold; margin: 10px 0; transition: transform 0.3s; }
        .val-safe { color: #3fb950; }
        .val-danger { color: #ff7b72; }
        
        /* 數值跳動特效 */
        .pop-effect { animation: pop 0.5s ease-out; }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }

        table { width: 100%; border-collapse: collapse; background: #161b22; border-radius: 10px; overflow: hidden; border: 1px solid #30363d; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #30363d; }
        th { background: #21262d; color: #8b949e; font-weight: 600; text-transform: uppercase; font-size: 13px; }
        tr:hover { background: #1c2128; }
        
        /* 新資料亮起特效 */
        .new-row-highlight { animation: highlightRow 2s ease-out forwards; }
        @keyframes highlightRow { 0% { background-color: rgba(88, 166, 255, 0.3); } 100% { background-color: transparent; } }

        .risk-high { color: #ff7b72; font-weight: bold; }
        .risk-safe { color: #3fb950; }
        .risk-warn { color: #d29922; }
        .live-indicator { display: inline-block; width: 10px; height: 10px; background-color: #3fb950; border-radius: 50%; margin-right: 8px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(63, 185, 80, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(63, 185, 80, 0); } 100% { box-shadow: 0 0 0 0 rgba(63, 185, 80, 0); } }
    </style>
</head>
<body>

    <div class="header">
        <h1>🛡️ AI 遠端家庭防護網 - 戰情儀表板</h1>
        <div id="clock" style="font-family: monospace; color: #8b949e;">--:--:--</div>
    </div>

    <div class="control-panel">
        <label>家庭邀請碼：</label>
        <input type="text" id="family-id-input" placeholder="請輸入 6 碼" maxlength="6">
        <button id="btn-manual" class="btn-manual">🔄 手動同步</button>
        <button id="btn-start" class="btn-start">▶️ 連線基地台</button>
        <button id="btn-stop" class="btn-stop">⏹️ 斷開連線</button>
        <div id="connection-status" class="status-badge">🔴 尚未連線 / 閒置中</div>
    </div>

    <div id="emergency-banner">
        ⚠️ [緊急警報] 您的家人剛剛瀏覽了高風險網頁，系統已強制攔截！
        <div id="emergency-detail" style="font-size: 14px; font-weight: normal; margin-top: 5px; color: #ffcccc;"></div>
    </div>

    <div class="stats-boxes">
        <div class="stat-box">
            <div style="color:#8b949e">總掃描次數</div>
            <div class="stat-value" id="stat-total">0</div>
        </div>
        <div class="stat-box">
            <div style="color:#8b949e">安全放行</div>
            <div class="stat-value val-safe" id="stat-safe">0</div>
        </div>
        <div class="stat-box">
            <div style="color:#8b949e">危險攔截</div>
            <div class="stat-value val-danger" id="stat-danger">0</div>
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="chart-container">
            <div class="chart-title">🛡️ 防護狀態比例</div>
            <canvas id="ratioChart"></canvas>
        </div>
        <div class="chart-container">
            <div class="chart-title">
                <span>📈 近期風險趨勢 (分數)</span>
                <span id="socket-indicator" style="display:none; font-size:12px; color:#3fb950;"><span class="live-indicator"></span>即時串流中</span>
            </div>
            <canvas id="trendChart"></canvas>
        </div>
    </div>

    <div class="chart-title" style="margin-top:20px;">📜 詳細掃描紀錄 (最新 20 筆)</div>
    <table>
        <thead>
            <tr>
                <th>偵測時間</th>
                <th>目標網址</th>
                <th>風險指數</th>
                <th>AI 分析原因</th>
                <th>狀態</th>
            </tr>
        </thead>
        <tbody id="log-table-body">
            <tr><td colspan="5" style="text-align:center; color:#8b949e;">請輸入家庭邀請碼並開啟連線...</td></tr>
        </tbody>
    </table>

    <script>
        // --- 預設設定 ---
        window.CONFIG = window.CONFIG || {
            API_BASE_URL: "http://127.0.0.1:5000",
            RISK_THRESHOLD_HIGH: 70,
            RISK_THRESHOLD_MEDIUM: 40
        };

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('zh-TW'); }, 1000);

        let socket = null;
        let ratioChartInstance = null;
        let trendChartInstance = null;
        let isFetching = false;
        let currentFamilyID = "";

        // ==========================================
        // 👑 初始化與 WebSocket 邏輯
        // ==========================================
        window.onload = () => {
            const savedFamilyID = localStorage.getItem('savedFamilyID');
            const isAutoMonitorOn = localStorage.getItem('autoMonitor') === 'true';

            if (savedFamilyID) {
                document.getElementById('family-id-input').value = savedFamilyID;
                if (isAutoMonitorOn) startMonitoring(savedFamilyID);
            }
        };

        function initSocket(familyID) {
            if (!socket) {
                socket = io(CONFIG.API_BASE_URL);

                socket.on('connect', () => {
                    console.log('🔗 WebSocket 連線成功');
                    document.getElementById('connection-status').className = "status-badge status-connected";
                    document.getElementById('connection-status').innerHTML = `<span class="live-indicator"></span>連線成功 (代碼: ${familyID})`;
                    document.getElementById('socket-indicator').style.display = "inline-block";
                    socket.emit('join_family_room', { familyID: familyID });
                });

                socket.on('disconnect', () => {
                    console.log('❌ WebSocket 斷線');
                    document.getElementById('connection-status').className = "status-badge status-loading";
                    document.getElementById('connection-status').innerText = `⚠️ 伺服器斷線，嘗試重連中...`;
                    document.getElementById('socket-indicator').style.display = "none";
                });

                // 👑 接收到新的掃描結果！不需要 Polling 了！
                socket.on('new_scan_result', (data) => {
                    console.log("📥 收到即時掃描資料:", data);
                    // 為了保持資料的完整性與圖表的正確渲染，直接呼叫 fetchLogs 拉取最新 20 筆
                    fetchLogs(familyID, true); 
                });

                // 👑 接收到強制攔截的緊急警報！
                socket.on('emergency_alert', (data) => {
                    console.log("🚨 收到緊急警報:", data);
                    showEmergencyBanner(data.url, data.reason);
                });
            } else {
                // 如果 Socket 已經存在，只要切換房間即可
                socket.emit('join_family_room', { familyID: familyID });
            }
        }

        function showEmergencyBanner(url, reason) {
            const banner = document.getElementById('emergency-banner');
            const detail = document.getElementById('emergency-detail');
            detail.innerText = `網址：${url.substring(0, 50)}... | 特徵：${reason}`;
            banner.style.display = "block";
            
            // 讓危險數值跳動一下
            const dangerElement = document.getElementById('stat-danger');
            dangerElement.classList.remove('pop-effect');
            void dangerElement.offsetWidth; // 觸發 reflow 重新執行動畫
            dangerElement.classList.add('pop-effect');

            setTimeout(() => { banner.style.display = "none"; }, 10000);
        }

        // ==========================================
        // 介面控制邏輯
        // ==========================================
        document.getElementById('btn-manual').addEventListener('click', () => {
            if (isFetching) return;
            const familyID = document.getElementById('family-id-input').value.trim().toUpperCase();
            if(!familyID) return alert("請輸入 6 碼邀請碼");
            localStorage.setItem('savedFamilyID', familyID); 
            fetchLogs(familyID, false);
        });

        document.getElementById('btn-start').addEventListener('click', () => {
            const familyID = document.getElementById('family-id-input').value.trim().toUpperCase();
            if(!familyID) return alert("請輸入 6 碼邀請碼");
            
            localStorage.setItem('savedFamilyID', familyID); 
            localStorage.setItem('autoMonitor', 'true');     
            startMonitoring(familyID);
        });

        document.getElementById('btn-stop').addEventListener('click', stopMonitoring);

        function startMonitoring(familyID) {
            currentFamilyID = familyID;
            document.getElementById('family-id-input').disabled = true;
            document.getElementById('btn-start').style.display = "none";
            document.getElementById('btn-stop').style.display = "inline-block";
            
            // 啟動 WebSocket 並抓取歷史紀錄
            initSocket(familyID);
            fetchLogs(familyID, false); 
        }

        function stopMonitoring() {
            localStorage.setItem('autoMonitor', 'false');
            
            if (socket) {
                socket.disconnect();
                socket = null;
            }
            
            document.getElementById('connection-status').className = "status-badge";
            document.getElementById('connection-status').innerText = `🔴 已斷開連線`;
            document.getElementById('socket-indicator').style.display = "none";
            document.getElementById('family-id-input').disabled = false;
            document.getElementById('btn-start').style.display = "inline-block";
            document.getElementById('btn-stop').style.display = "none";
        }

        // ==========================================
        // 資料拉取與渲染邏輯
        // ==========================================
        async function fetchLogs(familyID, isRealtimeUpdate = false) {
            if (isFetching) return;
            isFetching = true;

            const btnManual = document.getElementById('btn-manual');
            btnManual.innerText = "⏳ 同步中...";
            btnManual.disabled = true;

            try {
                const res = await fetch(`${CONFIG.API_BASE_URL}/api/get_alerts`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ familyID: familyID })
                });
                
                if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
                
                const data = await res.json();

                if (data.data && data.data.length > 0) {
                    updateDashboard(data.data, isRealtimeUpdate);
                } else {
                    document.getElementById('log-table-body').innerHTML = '<tr><td colspan="5" style="text-align:center; color:#e3b341; font-weight:bold;">🟢 基地台連線成功！目前沒有任何警報紀錄。</td></tr>';
                    document.getElementById('stat-total').innerText = 0;
                    document.getElementById('stat-safe').innerText = 0;
                    document.getElementById('stat-danger').innerText = 0;
                    drawRatioChart(1, 0); 
                    drawTrendChart([], []);
                }
            } catch (err) {
                console.error("連線後端失敗", err);
                if (!socket || !socket.connected) {
                    document.getElementById('connection-status').className = "status-badge";
                    document.getElementById('connection-status').innerText = `🔴 API 連線失敗`;
                }
            } finally {
                isFetching = false;
                btnManual.innerText = "🔄 手動同步";
                btnManual.disabled = false;
            }
        }

        function updateDashboard(records, isRealtimeUpdate) {
            const tbody = document.getElementById('log-table-body');
            tbody.innerHTML = "";
            
            let safeCount = 0;
            let dangerCount = 0;
            let labels = [];
            let scores = [];

            let chartRecords = [...records].reverse();

            chartRecords.forEach(record => {
                let report = {};
                try { report = typeof record.report === 'string' ? JSON.parse(record.report) : record.report; } catch(e) {}
                let score = parseInt(report.riskScore || report.RiskScore || report.risk_score);
                if (isNaN(score)) score = 0;
                
                if (score >= (window.CONFIG.RISK_THRESHOLD_HIGH)) dangerCount++; else safeCount++;
                labels.push(record.timestamp.split(' ')[1]);
                scores.push(score);
            });

            // 數值跳動動畫處理
            const totalEl = document.getElementById('stat-total');
            const safeEl = document.getElementById('stat-safe');
            const dangerEl = document.getElementById('stat-danger');

            if (totalEl.innerText !== records.length.toString()) { totalEl.classList.remove('pop-effect'); void totalEl.offsetWidth; totalEl.classList.add('pop-effect'); totalEl.innerText = records.length; }
            if (safeEl.innerText !== safeCount.toString()) { safeEl.classList.remove('pop-effect'); void safeEl.offsetWidth; safeEl.classList.add('pop-effect'); safeEl.innerText = safeCount; }
            if (dangerEl.innerText !== dangerCount.toString()) { dangerEl.classList.remove('pop-effect'); void dangerEl.offsetWidth; dangerEl.classList.add('pop-effect'); dangerEl.innerText = dangerCount; }

            drawRatioChart(safeCount, dangerCount);
            drawTrendChart(labels, scores);

            records.forEach((record, index) => {
                let report = {};
                try { report = typeof record.report === 'string' ? JSON.parse(record.report) : record.report; } 
                catch(e) { report = { riskScore: 0, reason: "資料解析失敗" }; }
                
                let score = parseInt(report.riskScore || report.RiskScore || report.risk_score);
                if (isNaN(score)) score = 0; 
                
                let reason = report.reason || report.Reason || report.description || "系統已自動記錄此特徵";
                let riskClass = score >= window.CONFIG.RISK_THRESHOLD_HIGH ? 'risk-high' : (score >= window.CONFIG.RISK_THRESHOLD_MEDIUM ? 'risk-warn' : 'risk-safe');
                let statusBadge = score >= window.CONFIG.RISK_THRESHOLD_HIGH ? '🛑 已攔截' : '✅ 允許通行';

                let tr = document.createElement('tr');
                // 如果是透過 WebSocket 推播進來的第一筆最新資料，加入高亮動畫
                if (isRealtimeUpdate && index === 0) {
                    tr.className = "new-row-highlight";
                }

                tr.innerHTML = `
                    <td style="font-family:monospace; color:#8b949e;">${record.timestamp.split(' ')[1]}</td>
                    <td style="max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="${record.url}">${record.url}</td>
                    <td class="${riskClass}"><span style="font-size:18px; font-weight:bold;">${score}</span> / 100</td>
                    <td style="max-width:400px; font-size:13px; color:#c9d1d9;">${reason}</td>
                    <td class="${riskClass}">${statusBadge}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function drawRatioChart(safe, danger) {
            const ctx = document.getElementById('ratioChart').getContext('2d');
            if(ratioChartInstance) ratioChartInstance.destroy();
            ratioChartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['安全放行', '危險攔截'],
                    datasets: [{ data: [safe, danger], backgroundColor: ['#238636', '#da3633'], borderWidth: 0 }]
                },
                options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { color: '#c9d1d9' } } }, animation: { duration: 500 } }
            });
        }

        function drawTrendChart(labels, data) {
            const ctx = document.getElementById('trendChart').getContext('2d');
            if(trendChartInstance) trendChartInstance.destroy();
            trendChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{ label: '網頁風險指數', data: data, borderColor: '#58a6ff', backgroundColor: 'rgba(88, 166, 255, 0.2)', borderWidth: 2, fill: true, tension: 0.4, pointBackgroundColor: '#58a6ff' }]
                },
                options: { 
                    responsive: true, 
                    animation: { duration: 500 },
                    scales: { 
                        y: { beginAtZero: true, max: 100, grid: { color: '#30363d' }, ticks: { color: '#8b949e' } },
                        x: { grid: { display: false }, ticks: { color: '#8b949e' } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }
    </script>
</body>
</html>
