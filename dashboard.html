<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>AI 防詐戰情室 - 全自動記憶版</title>
    <script src="config.js"></script> 
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { margin: 0; padding: 20px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0d1117; color: #c9d1d9; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #30363d; padding-bottom: 15px; margin-bottom: 20px; }
        .header h1 { margin: 0; color: #58a6ff; font-size: 24px; letter-spacing: 2px; }
        
        .control-panel { background: #161b22; padding: 20px; border-radius: 10px; border: 1px solid #30363d; margin-bottom: 20px; display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }
        input { background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; padding: 10px 15px; border-radius: 5px; font-size: 16px; font-weight: bold; letter-spacing: 2px; outline: none; text-align: center; width: 150px; }
        input:focus { border-color: #58a6ff; }
        
        button { border: none; padding: 10px 20px; border-radius: 5px; font-size: 15px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-start { background: #238636; color: white; }
        .btn-start:hover { background: #2ea043; }
        .btn-stop { background: #da3633; color: white; display: none; }
        .btn-stop:hover { background: #f85149; }
        .btn-manual { background: #1f6feb; color: white; }
        .btn-manual:hover { background: #388bfd; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }

        .status-badge { padding: 8px 15px; border-radius: 20px; font-size: 14px; font-weight: bold; background: #30363d; color: #8b949e; transition: 0.3s; }
        .status-connected { background: rgba(35, 134, 54, 0.2); color: #3fb950; border: 1px solid #238636; }
        .status-loading { background: rgba(210, 153, 34, 0.2); color: #d29922; border: 1px solid #d29922; }

        #emergency-banner { display: none; background: #da3633; color: white; padding: 15px 20px; border-radius: 10px; margin-bottom: 20px; font-weight: bold; font-size: 18px; text-align: center; box-shadow: 0 0 20px rgba(218, 54, 51, 0.5); animation: flash 1s infinite alternate; }
        @keyframes flash { from { opacity: 1; } to { opacity: 0.7; } }

        .dashboard-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; margin-bottom: 20px; }
        .chart-container { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 20px; }
        .chart-title { font-size: 16px; font-weight: bold; color: #8b949e; margin-bottom: 15px; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
        
        .stats-boxes { display: flex; gap: 15px; margin-bottom: 20px; }
        .stat-box { flex: 1; background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 15px; text-align: center; }
        .stat-value { font-size: 36px; font-weight: bold; margin: 10px 0; }
        .val-safe { color: #3fb950; }
        .val-danger { color: #ff7b72; }

        table { width: 100%; border-collapse: collapse; background: #161b22; border-radius: 10px; overflow: hidden; border: 1px solid #30363d; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #30363d; }
        th { background: #21262d; color: #8b949e; font-weight: 600; text-transform: uppercase; font-size: 13px; }
        tr:hover { background: #1c2128; }
        .risk-high { color: #ff7b72; font-weight: bold; }
        .risk-safe { color: #3fb950; }
        .risk-warn { color: #d29922; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🛡️ AI 遠端家庭防護網 - 戰情儀表板</h1>
        <div id="clock" style="font-family: monospace; color: #8b949e;">--:--:--</div>
    </div>

    <div class="control-panel">
        <label>家庭邀請碼：</label>
        <input type="text" id="family-id-input" placeholder="請輸入 6 碼">
        <button id="btn-manual" class="btn-manual">🔄 手動更新</button>
        <button id="btn-start" class="btn-start">▶️ 開啟自動監控</button>
        <button id="btn-stop" class="btn-stop">⏹️ 停止監控</button>
        <div id="connection-status" class="status-badge">🔴 尚未連線 / 閒置中</div>
    </div>

    <div id="emergency-banner">
        ⚠️ [緊急警報] 您的家人剛剛瀏覽了高風險網頁，系統已強制攔截！
    </div>

    <div class="stats-boxes">
        <div class="stat-box">
            <div style="color:#8b949e">總掃描次數</div>
            <div class="stat-value" id="stat-total">0</div>
        </div>
        <div class="stat-box">
            <div style="color:#8b949e">安全放行</div>
            <div class="stat-value val-safe" id="stat-safe">0</div>
        </div>
        <div class="stat-box">
            <div style="color:#8b949e">危險攔截</div>
            <div class="stat-value val-danger" id="stat-danger">0</div>
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="chart-container">
            <div class="chart-title">🛡️ 防護狀態比例</div>
            <canvas id="ratioChart"></canvas>
        </div>
        <div class="chart-container">
            <div class="chart-title">📈 近期風險趨勢 (分數)</div>
            <canvas id="trendChart"></canvas>
        </div>
    </div>

    <div class="chart-title" style="margin-top:20px;">📜 詳細掃描紀錄 (最新 10 筆)</div>
    <table>
        <thead>
            <tr>
                <th>偵測時間</th>
                <th>目標網址</th>
                <th>風險指數</th>
                <th>AI 分析原因</th>
                <th>狀態</th>
            </tr>
        </thead>
        <tbody id="log-table-body">
            <tr><td colspan="5" style="text-align:center; color:#8b949e;">請輸入家庭邀請碼並開啟監控...</td></tr>
        </tbody>
    </table>

    <script>
        // --- 預設設定防呆 (避免找不到 config.js 時壞掉) ---
        window.CONFIG = window.CONFIG || {
            API_BASE_URL: "http://127.0.0.1:5000", // 如果你部署到雲端，請在這裡改成雲端網址
            POLLING_INTERVAL_MS: 5000,
            RISK_THRESHOLD_HIGH: 70,
            RISK_THRESHOLD_MEDIUM: 40
        };

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('zh-TW'); }, 1000);

        let monitoringInterval = null;
        let lastAlertTime = "";
        let ratioChartInstance = null;
        let trendChartInstance = null;
        let isFetching = false; // 防止重複發送請求

        // ==========================================
        // ✨ 新增功能 1：網頁載入時「自動記憶與恢復」
        // ==========================================
        window.onload = () => {
            const savedFamilyID = localStorage.getItem('savedFamilyID');
            const isAutoMonitorOn = localStorage.getItem('autoMonitor') === 'true';

            if (savedFamilyID) {
                document.getElementById('family-id-input').value = savedFamilyID;
                if (isAutoMonitorOn) {
                    startMonitoring(savedFamilyID);
                }
            }
        };

        // ==========================================
        // ✨ 新增功能 2：操作按鈕邏輯強化 (加入狀態儲存)
        // ==========================================
        document.getElementById('btn-manual').addEventListener('click', () => {
            if (isFetching) return;
            const familyID = document.getElementById('family-id-input').value.trim().toUpperCase();
            if(!familyID) return alert("請輸入 6 碼邀請碼");
            
            localStorage.setItem('savedFamilyID', familyID); // 記憶代碼
            fetchLogs(familyID);
        });

        document.getElementById('btn-start').addEventListener('click', () => {
            const familyID = document.getElementById('family-id-input').value.trim().toUpperCase();
            if(!familyID) return alert("請輸入 6 碼邀請碼");
            
            localStorage.setItem('savedFamilyID', familyID); // 記憶代碼
            localStorage.setItem('autoMonitor', 'true');     // 記憶開啟監控
            startMonitoring(familyID);
        });

        document.getElementById('btn-stop').addEventListener('click', stopMonitoring);

        function startMonitoring(familyID) {
            if (monitoringInterval) clearInterval(monitoringInterval);

            document.getElementById('family-id-input').disabled = true;
            document.getElementById('btn-start').style.display = "none";
            document.getElementById('btn-stop').style.display = "inline-block";
            
            fetchLogs(familyID); 
            monitoringInterval = setInterval(() => fetchLogs(familyID), window.CONFIG.POLLING_INTERVAL_MS); 
        }

        function stopMonitoring() {
            if (monitoringInterval) {
                clearInterval(monitoringInterval);
                monitoringInterval = null;
            }
            localStorage.setItem('autoMonitor', 'false'); // 記憶關閉監控
            
            document.getElementById('connection-status').className = "status-badge";
            document.getElementById('connection-status').innerText = `🔴 暫停監控`;
            document.getElementById('family-id-input').disabled = false;
            document.getElementById('btn-start').style.display = "inline-block";
            document.getElementById('btn-stop').style.display = "none";
            document.getElementById('btn-manual').innerText = "🔄 手動更新";
            document.getElementById('btn-manual').disabled = false;
        }

        // ==========================================
        // ✨ 新增功能 3：加入「讀取中」視覺回饋 (Loading State)
        // ==========================================
        async function fetchLogs(familyID) {
            if (isFetching) return;
            isFetching = true;

            const statusBadge = document.getElementById('connection-status');
            const btnManual = document.getElementById('btn-manual');
            
            // 變更 UI 狀態讓使用者知道「系統有在動」
            statusBadge.className = "status-badge status-loading";
            statusBadge.innerText = `⏳ 讀取資料中...`;
            btnManual.innerText = "⏳ 讀取中...";
            btnManual.disabled = true;

            try {
                const res = await fetch(`${CONFIG.API_BASE_URL}/api/get_alerts`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ familyID: familyID })
                });
                
                if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
                
                const data = await res.json();
                
                // 恢復 UI 連線成功狀態
                statusBadge.className = "status-badge status-connected";
                statusBadge.innerText = `🟢 監控中 (代碼: ${familyID})`;

                if (data.data && data.data.length > 0) {
                    updateDashboard(data.data);
                } else {
                    document.getElementById('log-table-body').innerHTML = '<tr><td colspan="5" style="text-align:center; color:#e3b341; font-weight:bold;">🟢 連線成功！目前資料庫中沒有此家庭的警報紀錄。</td></tr>';
                    
                    // 若無資料，將圖表歸零
                    document.getElementById('stat-total').innerText = 0;
                    document.getElementById('stat-safe').innerText = 0;
                    document.getElementById('stat-danger').innerText = 0;
                    drawRatioChart(1, 0); // 給個空的比例圖
                    drawTrendChart([], []);
                }
            } catch (err) {
                console.error("連線後端失敗", err);
                statusBadge.className = "status-badge";
                statusBadge.innerText = `🔴 連線失敗`;
                document.getElementById('log-table-body').innerHTML = `<tr><td colspan="5" style="text-align:center; color:#da3633;">❌ 無法連線至伺服器 (${CONFIG.API_BASE_URL})，請確認伺服器是否已啟動。</td></tr>`;
                
                // 如果連線失敗，自動停止監控以免不斷發送錯誤請求
                if (monitoringInterval) stopMonitoring();
            } finally {
                isFetching = false;
                if (!monitoringInterval) {
                    btnManual.innerText = "🔄 手動更新";
                    btnManual.disabled = false;
                } else {
                    btnManual.innerText = "🔄 更新完成";
                    setTimeout(() => { if(monitoringInterval) btnManual.innerText = "🔄 手動更新"; }, 1000);
                    btnManual.disabled = false;
                }
            }
        }

        // --- 以下為圖表與表格渲染邏輯 (不變) ---
        function updateDashboard(records) {
            const tbody = document.getElementById('log-table-body');
            tbody.innerHTML = "";
            
            let safeCount = 0;
            let dangerCount = 0;
            let labels = [];
            let scores = [];

            let chartRecords = [...records].reverse();

            chartRecords.forEach(record => {
                let report = {};
                try { report = typeof record.report === 'string' ? JSON.parse(record.report) : record.report; } catch(e) {}
                let score = parseInt(report.riskScore || report.RiskScore || report.risk_score);
                if (isNaN(score)) score = 0;
                
                if (score >= (window.CONFIG.RISK_THRESHOLD_HIGH)) dangerCount++; else safeCount++;
                labels.push(record.timestamp.split(' ')[1]);
                scores.push(score);
            });

            document.getElementById('stat-total').innerText = records.length;
            document.getElementById('stat-safe').innerText = safeCount;
            document.getElementById('stat-danger').innerText = dangerCount;

            drawRatioChart(safeCount, dangerCount);
            drawTrendChart(labels, scores);

            records.forEach(record => {
                let report = {};
                try { report = typeof record.report === 'string' ? JSON.parse(record.report) : record.report; } 
                catch(e) { report = { riskScore: 0, reason: "資料解析失敗" }; }
                
                let score = parseInt(report.riskScore || report.RiskScore || report.risk_score);
                if (isNaN(score)) score = 0; 
                
                let reason = report.reason || report.Reason || report.description || "系統已自動記錄此特徵";
                let riskClass = score >= window.CONFIG.RISK_THRESHOLD_HIGH ? 'risk-high' : (score >= window.CONFIG.RISK_THRESHOLD_MEDIUM ? 'risk-warn' : 'risk-safe');
                let statusBadge = score >= window.CONFIG.RISK_THRESHOLD_HIGH ? '🛑 已攔截' : '✅ 允許通行';

                let tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="font-family:monospace; color:#8b949e;">${record.timestamp.split(' ')[1]}</td>
                    <td style="max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="${record.url}">${record.url}</td>
                    <td class="${riskClass}"><span style="font-size:18px; font-weight:bold;">${score}</span> / 100</td>
                    <td style="max-width:400px; font-size:13px; color:#c9d1d9;">${reason}</td>
                    <td class="${riskClass}">${statusBadge}</td>
                `;
                tbody.appendChild(tr);
            });

            checkEmergency(records[0]); 
        }

        function drawRatioChart(safe, danger) {
            const ctx = document.getElementById('ratioChart').getContext('2d');
            if(ratioChartInstance) ratioChartInstance.destroy();
            ratioChartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['安全放行', '危險攔截'],
                    datasets: [{ data: [safe, danger], backgroundColor: ['#238636', '#da3633'], borderWidth: 0 }]
                },
                options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { color: '#c9d1d9' } } } }
            });
        }

        function drawTrendChart(labels, data) {
            const ctx = document.getElementById('trendChart').getContext('2d');
            if(trendChartInstance) trendChartInstance.destroy();
            trendChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{ label: '網頁風險指數', data: data, borderColor: '#58a6ff', backgroundColor: 'rgba(88, 166, 255, 0.2)', borderWidth: 2, fill: true, tension: 0.4 }]
                },
                options: { 
                    responsive: true, 
                    scales: { 
                        y: { beginAtZero: true, max: 100, grid: { color: '#30363d' }, ticks: { color: '#8b949e' } },
                        x: { grid: { display: false }, ticks: { color: '#8b949e' } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function checkEmergency(latestRecord) {
            let report = {};
            try { report = typeof latestRecord.report === 'string' ? JSON.parse(latestRecord.report) : latestRecord.report; } catch(e) {}
            let score = parseInt(report.riskScore || report.RiskScore || report.risk_score);
            if (isNaN(score)) score = 0;

            const banner = document.getElementById('emergency-banner');
            if (score >= window.CONFIG.RISK_THRESHOLD_HIGH && latestRecord.timestamp !== lastAlertTime) {
                banner.style.display = "block";
                lastAlertTime = latestRecord.timestamp; 
                setTimeout(() => { banner.style.display = "none"; }, 8000);
            }
        }
    </script>
</body>
</html>
